<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MIE — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:#202124;font-size:13px;}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;}
.spinner{width:24px;height:24px;border:2.5px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.auth-wrap{display:none;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;padding:24px;}
.auth-card{background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.07);}
.auth-logo{width:56px;height:56px;border-radius:50%;background:#1a73e8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:24px;margin:0 auto 16px;}
.auth-title{font-size:22px;font-weight:600;margin-bottom:5px;}
.auth-sub{font-size:13px;color:#5f6368;margin-bottom:26px;line-height:1.6;}
.connect-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:50px;padding:11px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:box-shadow .15s,background .15s;}
.connect-btn:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.connect-btn svg{flex-shrink:0;}
.auth-divider{margin:20px 0;display:flex;align-items:center;gap:10px;}
.auth-divider-line{flex:1;height:1px;background:#e0e0e0;}
.auth-divider-text{font-size:11px;color:#9aa0a6;}
.auth-footer{margin-top:24px;font-size:11px;color:#9aa0a6;line-height:1.6;}
.auth-footer a{color:#1a73e8;text-decoration:none;}
.auth-footer a:hover{text-decoration:underline;}
.error-msg{font-size:12px;color:#c5221f;margin-top:14px;display:none;}
</style>
</head>
<body>

<div id="loading-wrap" class="spinner-wrap">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#5f6368;margin-top:4px;">Checking session…</div>
</div>

<div id="auth-wrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">M</div>
    <div class="auth-title">MIE</div>
    <div class="auth-sub">Your messages. Your calendar.<br>Zero effort.</div>
    <button class="connect-btn" id="connect-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <div class="error-msg" id="error-msg">Sign-in failed. Please try again.</div>
    <div class="auth-footer">
      By continuing, you agree to our
      <a href="/privacy" target="_blank">Privacy Policy</a>.
    </div>
  </div>
</div>

<script>
'use strict';
var BACKEND='https://api.mie.today';

function showLogin(){
  document.getElementById('loading-wrap').style.display='none';
  document.getElementById('auth-wrap').style.display='flex';
}

// Check if already logged in — if so, go straight to dashboard
fetch(BACKEND+'/api/me/status',{credentials:'include'})
  .then(function(r){return r.ok?r.json():null;})
  .then(function(d){
    if(d&&d.connected){
      window.location.replace('/dashboard');
    } else {
      showLogin();
    }
  })
  .catch(function(){showLogin();});

document.getElementById('connect-btn').addEventListener('click',function(){
  window.location.href=BACKEND+'/auth/google';
});
</script>
</body>
</html>
