<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trip "This or That" Poll</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-6 px-3 sm:px-6 font-sans text-slate-800">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-4 sm:p-8 border border-slate-200">
        
        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-slate-500 font-medium">Syncing live trip data...</p>
        </div>

        <div id="app-content">
            <header class="text-center mb-6">
                <h1 id="main-title" class="text-3xl font-black text-indigo-600 tracking-tight mb-1">✈️ Trip "This or That"</h1>
                <p id="view-subtitle" class="text-slate-500 text-sm font-medium">Design options for your upcoming group trip.</p>
            </header>

            <div id="poll-tabs" class="hidden flex border-b border-slate-200 mb-6 font-bold text-sm">
                <button id="tab-vote" onclick="switchTab('vote')" class="flex-1 py-3 text-center border-b-2 border-indigo-600 text-indigo-600">🗳️ Cast Votes</button>
                <button id="tab-results" onclick="switchTab('results')" class="flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700">📊 Live Standings</button>
            </div>

            <div id="creator-view" class="space-y-4">
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-inner">
                    <h3 class="text-xs font-black uppercase tracking-wider text-indigo-800 mb-2">➕ Add Choice Pair</h3>
                    <div class="flex flex-col gap-2.5 sm:flex-row">
                        <input type="text" id="optionA" placeholder="Option A (e.g., Beach resort)" class="w-full px-3 py-2 text-base sm:text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <span class="text-center self-center text-xs font-black text-indigo-300 sm:block hidden">OR</span>
                        <input type="text" id="optionB" placeholder="Option B (e.g., Mountain cabin)" class="w-full px-3 py-2 text-base sm:text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <button onclick="addNewPair()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2 rounded-lg text-sm shrink-0">Add</button>
                    </div>
                </div>
                <button onclick="launchLivePoll()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 px-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-base">
                    🚀 Launch Live Group Poll & Copy Link
                </button>
            </div>

            <div id="voter-submit-block" class="hidden mb-6">
                <button onclick="submitGroupVotes()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 px-4 rounded-xl shadow-md text-base transition-all">
                    📤 Submit My Selections
                </button>
            </div>

            <div id="card-container" class="space-y-3.5"></div>
        </div>
    </div>

    <script>
        let pollData = {
            pairs: [
                { a: "Packed Itinerary", b: "Go with the Flow" },
                { a: "Mountain Hideaway", b: "Beachfront Resort" },
                { a: "Local Coffee Shops", b: "Matcha Bars" }
            ],
            votes: [{a:0, b:0}, {a:0, b:0}, {a:0, b:0}]
        };

        let pollId = "";
        let currentTab = "vote"; 
        let userSelections = {}; 
        
        const container = document.getElementById('card-container');
        const loader = document.getElementById('loading');
        const content = document.getElementById('app-content');
        
        // Zero-setup open API URL for automated JSON structures
        const JSONBLOB_API_URL = "https://jsonblob.com/api/jsonBlob";

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            pollId = urlParams.get('id');

            if (pollId) {
                showLoading(true);
                document.getElementById('creator-view').classList.add('hidden');
                document.getElementById('poll-tabs').classList.remove('hidden');
                document.getElementById('main-title').innerText = "🗳️ Group Trip Poll";
                
                await fetchLiveResults();
                showLoading(false);
                
                if (localStorage.getItem(`voted_${pollId}`)) {
                    switchTab('results');
                } else {
                    switchTab('vote');
                }
            } else {
                renderCreatorList();
            }
        });

        function showLoading(show) {
            loader.className = show ? "block py-12" : "hidden";
            content.className = show ? "hidden" : "block";
        }

        async function fetchLiveResults() {
            try {
                const response = await fetch(`${JSONBLOB_API_URL}/${pollId}`);
                if (!response.ok) throw new Error();
                pollData = await response.json();
            } catch (e) {
                alert("Error pulling live standings. Check internet connection.");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const voteBtn = document.getElementById('tab-vote');
            const resBtn = document.getElementById('tab-results');
            const submitBlock = document.getElementById('voter-submit-block');

            if (tab === 'vote') {
                voteBtn.className = "flex-1 py-3 text-center border-b-2 border-indigo-600 text-indigo-600 font-bold";
                resBtn.className = "flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700";
                
                if (!localStorage.getItem(`voted_${pollId}`)) {
                    submitBlock.classList.remove('hidden');
                }
                renderVotingList();
            } else {
                resBtn.className = "flex-1 py-3 text-center border-b-2 border-indigo-600 text-indigo-600 font-bold";
                voteBtn.className = "flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700";
                submitBlock.classList.add('hidden');
                
                fetchLiveResults().then(() => renderResultsDashboard());
            }
        }

        function renderCreatorList() {
            document.getElementById('view-subtitle').innerText = "Design the custom choices for your trip link.";
            container.innerHTML = '';
            pollData.pairs.forEach((pair, idx) => {
                const card = document.createElement('div');
                card.className = 'flex items-center justify-between bg-white border border-slate-200 p-3 rounded-xl shadow-sm font-bold text-xs sm:text-sm gap-2';
                card.innerHTML = `
                    <span class="text-indigo-700 bg-indigo-50 border border-indigo-100 p-2 rounded-lg flex-1 text-center truncate">${pair.a}</span>
                    <span class="text-[10px] text-slate-400 font-black shrink-0">OR</span>
                    <span class="text-emerald-700 bg-emerald-50 border border-emerald-100 p-2 rounded-lg flex-1 text-center truncate">${pair.b}</span>
                    <button onclick="deletePair(${idx})" class="text-slate-400 hover:text-red-500 p-1 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function renderVotingList() {
            document.getElementById('view-subtitle').innerText = "Pick your options, then click submit down below!";
            container.innerHTML = '';
            pollData.pairs.forEach((pair, idx) => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 p-3 rounded-xl shadow-sm';
                
                const sel = userSelections[idx];
                const aClass = sel === 'a' ? 'border-2 border-indigo-600 bg-indigo-50 font-bold text-indigo-900' : 'border border-slate-200 text-slate-700 hover:bg-slate-50';
                const bClass = sel === 'b' ? 'border-2 border-emerald-600 bg-emerald-50 font-bold text-emerald-900' : 'border border-slate-200 text-slate-700 hover:bg-slate-50';

                card.innerHTML = `
                    <div class="flex items-center justify-between gap-3 text-center text-xs sm:text-sm font-semibold">
                        <button onclick="selectVote(${idx}, 'a')" class="flex-1 p-3 rounded-xl transition-all ${aClass}">${pair.a}</button>
                        <span class="text-[10px] text-slate-400 font-black">VS</span>
                        <button onclick="selectVote(${idx}, 'b')" class="flex-1 p-3 rounded-xl transition-all ${bClass}">${pair.b}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderResultsDashboard() {
            document.getElementById('view-subtitle').innerText = "Real-time results from everyone who has voted.";
            container.innerHTML = '';
            
            pollData.pairs.forEach((pair, idx) => {
                const voteCounts = pollData.votes[idx] || { a: 0, b: 0 };
                const total = voteCounts.a + voteCounts.b;
                const pctA = total > 0 ? Math.round((voteCounts.a / total) * 100) : 0;
                const pctB = total > 0 ? Math.round((voteCounts.b / total) * 100) : 0;

                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 p-4 rounded-xl shadow-sm space-y-2';
                card.innerHTML = `
                    <div class="flex justify-between text-xs sm:text-sm font-bold text-slate-700">
                        <span class="${pctA >= pctB ? 'text-indigo-600' : ''}">${pair.a} (${voteCounts.a} votes)</span>
                        <span class="${pctB >= pctA ? 'text-emerald-600' : ''}">${pair.b} (${voteCounts.b} votes)</span>
                    </div>
                    <div class="w-full bg-slate-100 h-6 rounded-full overflow-hidden flex text-[10px] font-black text-white text-center shadow-inner">
                        <div style="width: ${pctA === 0 && pctB === 0 ? 50 : pctA}%" class="bg-indigo-500 h-full flex items-center justify-center transition-all duration-500">${pctA > 0 ? pctA + '%' : ''}</div>
                        <div style="width: ${pctA === 0 && pctB === 0 ? 50 : pctB}%" class="bg-emerald-500 h-full flex items-center justify-center transition-all duration-500">${pctB > 0 ? pctB + '%' : ''}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addNewPair() {
            const optA = document.getElementById('optionA').value.trim();
            const optB = document.getElementById('optionB').value.trim();
            if (optA && optB) {
                pollData.pairs.push({ a: optA, b: optB });
                pollData.votes.push({ a: 0, b: 0 });
                document.getElementById('optionA').value = '';
                document.getElementById('optionB').value = '';
                renderCreatorList();
            }
        }

        function deletePair(index) {
            pollData.pairs.splice(index, 1);
            pollData.votes.splice(index, 1);
            renderCreatorList();
        }

        function selectVote(idx, letter) {
            userSelections[idx] = letter;
            renderVotingList();
        }

        async function launchLivePoll() {
            if (pollData.pairs.length === 0) return alert("Add some options first!");
            showLoading(true);
            
            try {
                // Creates the remote database record dynamically
                const response = await fetch(JSONBLOB_API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(pollData)
                });

                if (!response.ok) throw new Error();

                // Reads the assigned system ID value back cleanly
                pollId = response.headers.get('X-Jsonblob') || response.headers.get('Location').split('/').pop();

                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${pollId}`;
                
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert("🚀 Live Poll Created & Link Copied!\n\nSend this exact link to your group. They can vote on it, and you can track results right here!");
                    window.location.href = shareUrl;
                });
            } catch (e) {
                alert("The storage relay rejected the payload. Please try again.");
                showLoading(false);
            }
        }

        async function submitGroupVotes() {
            const size = pollData.pairs.length;
            if (Object.keys(userSelections).length < size) {
                alert("Please select choices for every row before submitting!");
                return;
            }
            showLoading(true);
            try {
                await fetchLiveResults();
                
                for (let idx = 0; idx < size; idx++) {
                    const choice = userSelections[idx];
                    if (choice === 'a') pollData.votes[idx].a += 1;
                    if (choice === 'b') pollData.votes[idx].b += 1;
                }

                const response = await fetch(`${JSONBLOB_API_URL}/${pollId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(pollData)
                });

                if (!response.ok) throw new Error();

                localStorage.setItem(`voted_${pollId}`, true);
                showLoading(false);
                switchTab('results');
            } catch(e) {
                alert("Submission connection dropped. Retrying.");
                showLoading(false);
            }
        }
    </script>
</body>
</html>
