<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MIE Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════ RESET ══════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#f0f2f5;color:#202124;font-size:13px;}

/* ══════════════════════════ AUTH ══════════════════════════ */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;padding:24px;}
.auth-card{background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.07);}
.auth-logo{width:56px;height:56px;border-radius:50%;background:#1a73e8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:24px;margin:0 auto 16px;}
.auth-title{font-size:22px;font-weight:600;margin-bottom:5px;}
.auth-sub{font-size:13px;color:#5f6368;margin-bottom:26px;line-height:1.6;}
.connect-btn{background:#1a73e8;color:#fff;border:none;border-radius:50px;padding:12px 34px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.connect-btn:hover{background:#1765cc;}

/* ══════════════════════════ SPINNER ══════════════════════════ */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;}
.spinner{width:24px;height:24px;border:2.5px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══════════════════════════ SHELL ══════════════════════════ */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden;}

/* ══════════════════════════ TOPBAR ══════════════════════════ */
.topbar{
  flex-shrink:0;height:46px;background:#fff;
  border-bottom:1px solid #e0e0e0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:10;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;
  color:#5f6368;font-size:13px;font-family:'DM Sans',sans-serif;
  padding:5px 8px;border-radius:6px;transition:background .12s;
}
.back-btn:hover{background:#f1f3f4;color:#202124;}
.back-btn svg{width:14px;height:14px;flex-shrink:0;}
.tb-sep-line{width:1px;height:18px;background:#e0e0e0;}
.tb-logo{width:28px;height:28px;border-radius:50%;background:#1a73e8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;}
.tb-brand{font-size:15px;font-weight:600;color:#1a73e8;}
.tb-slash{font-size:13px;color:#dadce0;margin:0 2px;}
.tb-page{font-size:13px;color:#5f6368;font-weight:500;}
.tb-right{display:flex;align-items:center;gap:14px;}
.tb-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:#5f6368;}
.tb-sep{color:#dadce0;}
.tb-weather{display:flex;align-items:center;gap:3px;font-size:12px;color:#202124;}
.signout-btn{font-size:13px;color:#1a73e8;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.signout-btn:hover{text-decoration:underline;}
.add-fab{display:flex;align-items:center;gap:6px;background:#1a73e8;color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(26,115,232,.35);transition:background .15s,box-shadow .15s;}
.add-fab:hover{background:#1765cc;}

/* ══════════════════════════ BODY LAYOUT ══════════════════════════ */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0;padding:0;gap:0;align-items:stretch;}

/* ── KEY FIX: content-area now uses the same padding on both sides ── */
/* Dashboard uses padding:8px 20px 10px on body-wrap (no sidebar).   */
/* Task has a 200px sidebar flush-left, then content-area.            */
/* Adding padding-right:20px here gives the right edge the same 20px */
/* breathing room as the left sidebar's outer edge.                   */
.content-area{
  flex:1;min-width:0;display:flex;overflow:hidden;min-height:0;
  padding:8px 20px 10px 16px; /* left:16px (gap from sidebar), right:20px matches dashboard */
  gap:14px; /* matches dashboard body-wrap gap */
  align-items:stretch;
}

/* ══════════════════════════ LEFT SIDEBAR ══════════════════════════ */
.task-sidebar{
  flex:0 0 200px;min-width:0;
  display:flex;flex-direction:column;
  background:#fff;
  border-right:1px solid #e0e0e0;
  padding:10px 8px;overflow-y:auto;gap:1px;
}
.task-sidebar::-webkit-scrollbar{width:3px;}
.task-sidebar::-webkit-scrollbar-thumb{background:#e0e0e0;}
.sidebar-sec{font-size:9px;font-weight:600;color:#9aa0a6;text-transform:uppercase;letter-spacing:.08em;padding:6px 10px 3px;}
.tl-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;
  cursor:pointer;font-size:12px;font-weight:500;color:#3c4043;
  transition:background .12s;border:none;background:none;
  width:100%;font-family:'DM Sans',sans-serif;text-align:left;
}
.tl-item:hover{background:#f1f3f4;}
.tl-item.active{background:#e8f0fe;color:#1a73e8;}
.tl-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.tl-item.active svg{opacity:1;}
.tl-count{
  margin-left:auto;font-size:10px;font-weight:600;
  background:#f1f3f4;border-radius:8px;padding:1px 6px;color:#5f6368;
}
.tl-item.active .tl-count{background:#c5d9fb;color:#1a56b0;}
.tl-count.red-badge{background:#fce8e6 !important;color:#c5221f !important;}
.tl-sep{height:1px;background:#f1f3f4;margin:4px 6px;}
.tl-create{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  cursor:pointer;font-size:12px;color:#5f6368;border:none;background:none;
  width:100%;font-family:'DM Sans',sans-serif;text-align:left;transition:background .12s;
}
.tl-create:hover{background:#f1f3f4;color:#202124;}
.sidebar-stats{
  margin-top:auto;padding:10px 10px 4px;
  border-top:1px solid #f1f3f4;display:flex;flex-direction:column;gap:3px;
}
.stat-row{display:flex;justify-content:space-between;align-items:center;}
.stat-label{font-size:11px;color:#9aa0a6;}
.stat-val{font-size:11px;font-weight:600;color:#202124;}
.stat-val.green{color:#1e8e3e;}
.stat-val.red{color:#d93025;}

/* ══════════════════════════ CENTRE — TASK AREA ══════════════════════════ */
/* ── KEY FIX: task-centre uses flex:1 so it fills remaining space    ── */
/* ── after right-col takes its share, matching dashboard's col-left  ── */
.task-centre{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  background:#fff;border:1px solid #e0e0e0;border-radius:12px;
  overflow:hidden;
}
.task-topbar{
  flex-shrink:0;padding:14px 18px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.task-title-row{display:flex;align-items:center;gap:8px;}
.task-page-title{font-size:20px;font-weight:500;color:#202124;}

.chip-bar{display:flex;gap:6px;padding:10px 18px 10px;flex-shrink:0;border-bottom:1px solid #f1f3f4;}
.chip{
  background:none;border:1px solid #dadce0;border-radius:20px;
  padding:4px 14px;font-size:12px;font-weight:500;color:#5f6368;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;
}
.chip:hover{background:#f1f3f4;}
.chip.active{background:#1a73e8;color:#fff;border-color:#1a73e8;}

.task-scroll{flex:1;overflow-y:auto;padding:14px 18px;}
.task-scroll::-webkit-scrollbar{width:4px;}
.task-scroll::-webkit-scrollbar-thumb{background:#dadce0;border-radius:4px;}

.task-grid{display:grid;gap:14px;}
.task-grid.multi{grid-template-columns:1fr 1fr;}
.task-grid.single{grid-template-columns:1fr;max-width:640px;}

.task-list-card{
  background:#f8f9fa;border:1px solid #e8eaed;border-radius:10px;
  padding:14px 16px;display:flex;flex-direction:column;gap:2px;
  isolation:isolate;
}
.tlc-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e8eaed;
}
.tlc-name{font-size:13px;font-weight:600;color:#202124;}
.tlc-badge{font-size:10px;font-weight:500;color:#5f6368;background:#e8eaed;border-radius:8px;padding:2px 7px;}

.tlc-add{
  display:flex;align-items:center;gap:7px;padding:7px 4px;
  color:#1a73e8;cursor:pointer;font-size:12px;font-weight:500;
  border:none;background:none;font-family:'DM Sans',sans-serif;
  width:100%;text-align:left;border-radius:6px;transition:background .12s;
}
.tlc-add:hover{background:#e8f0fe;}
.tlc-add svg{width:14px;height:14px;flex-shrink:0;}

.tlc-task{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 4px;border-radius:6px;
  transition:background .1s;
  overflow:visible;
  position:relative;
}
.tlc-task:hover{background:#fff;}

.tlc-cb{
  width:18px;height:18px;min-width:18px;
  border:1.5px solid #9aa0a6;border-radius:50%;
  background:transparent;padding:0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  transition:border-color .15s,background .15s,transform .1s;
  position:relative;z-index:2;
  font-family:inherit;
  outline:none;
}
.tlc-cb:hover{border-color:#1a73e8;background:#e8f0fe;transform:scale(1.1);}
.tlc-cb:focus-visible{outline:2px solid #1a73e8;outline-offset:2px;}
.tlc-cb.checked{border-color:#1a73e8;background:#1a73e8;}
.tlc-cb.checked::after{content:'✓';color:#fff;font-size:10px;font-weight:700;line-height:1;}
.tlc-cb[disabled]{opacity:.45;cursor:wait;}

.tlc-task-body{flex:1;min-width:0;}
.tlc-task-name{font-size:13px;color:#202124;line-height:1.4;font-weight:500;}
.tlc-task-name.done{text-decoration:line-through;color:#9aa0a6;font-weight:400;}
.tlc-task-notes{font-size:11px;color:#9aa0a6;margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tlc-task-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.tlc-due-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;}
.tlc-due-chip.overdue{background:#fce8e6;color:#c5221f;}
.tlc-due-chip.today{background:#fef7e0;color:#b06000;}
.tlc-due-chip.future{background:#f1f3f4;color:#5f6368;}

.comp-sep{height:1px;background:#e8eaed;margin:6px 0;}
.tlc-completed-sec{
  display:flex;align-items:center;gap:6px;
  padding:6px 4px;cursor:pointer;color:#5f6368;font-size:11px;
  border-radius:6px;transition:background .12s;
}
.tlc-completed-sec:hover{background:#fff;}
.tlc-completed-sec svg{width:12px;height:12px;transition:transform .2s;}
.tlc-completed-sec.open svg{transform:rotate(90deg);}
.tlc-completed-tasks{display:none;}
.tlc-completed-tasks.show{display:block;}

.empty-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:10px;}
.empty-icon{font-size:40px;}
.empty-title{font-size:14px;font-weight:500;color:#5f6368;}
.empty-sub{font-size:12px;color:#9aa0a6;max-width:260px;line-height:1.6;}
.skeleton{height:13px;background:linear-gradient(90deg,#f1f3f4 25%,#e8eaed 50%,#f1f3f4 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:6px;margin:6px 0;}
@keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}

/* ══════════════════════════ RIGHT PANEL ══════════════════════════ */
/* ── KEY FIX: right-col matches dashboard's col-right exactly ── */
/* Dashboard col-right: flex:0 0 calc(40% - 16px)               */
/* We use the same ratio so both panels are proportional         */
.right-col{
  flex:0 0 calc(40% - 14px); /* 40% minus the 14px gap, mirrors dashboard */
  min-width:0;
  display:flex;flex-direction:column;gap:14px;
}

.r-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;}
.r-label{font-size:10px;font-weight:600;color:#5f6368;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}

.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.tag-chip{
  background:#f1f3f4;border:1px solid #e0e0e0;border-radius:12px;
  padding:3px 10px;font-size:11px;font-weight:500;color:#5f6368;
  cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;
  user-select:none;
}
.tag-chip:hover{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8;}
.tag-chip.selected{background:#1a73e8;border-color:#1a73e8;color:#fff;}

.msg-ta{
  width:100%;min-height:68px;
  border:1px solid #dadce0;border-radius:6px;
  padding:8px 10px;font-size:13px;resize:vertical;
  font-family:'DM Sans',sans-serif;color:#202124;outline:none;
}
.msg-ta:focus{border-color:#1a73e8;}
.msg-actions{display:flex;gap:8px;margin-top:8px;}
.attach-btn{
  background:#fff;border:1px solid #dadce0;border-radius:4px;
  padding:6px 12px;font-size:12px;cursor:pointer;color:#5f6368;
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;
}
.attach-btn:hover{background:#f1f3f4;}
.send-btn{
  flex:1;background:#1a73e8;color:#fff;border:none;border-radius:4px;
  padding:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.send-btn:hover:not(:disabled){background:#1765cc;}
.send-btn:disabled{background:#a8c7fa;cursor:not-allowed;}
.send-status{font-size:11px;text-align:center;margin-top:5px;min-height:13px;}
.fname{font-size:10px;color:#5f6368;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rm-btn{background:none;border:none;color:#d93025;cursor:pointer;font-size:12px;}

/* quick actions */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qa-btn{
  background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;
  padding:14px 6px;text-align:center;cursor:pointer;
  transition:all .15s;font-family:'DM Sans',sans-serif;
  text-decoration:none;display:block;
}
.qa-btn:hover{background:#f1f3f4;border-color:#1a73e8;}
.qa-btn.qa-active{background:#e8f0fe;border-color:#1a73e8;}
.qa-icon{font-size:22px;margin-bottom:6px;}
.qa-name{font-size:14px;font-weight:500;color:#202124;}
.qa-desc{display:none;} /* Korean subtitles hidden */

/* ══════════════════════════ MODALS ══════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;}
.modal-bg.hidden{display:none;}
.modal-box{background:#fff;border-radius:12px;padding:20px;max-width:420px;width:100%;box-shadow:0 8px 28px rgba(0,0,0,.16);animation:mIn .18s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:none;}}
.modal-title{font-size:15px;font-weight:600;color:#202124;margin-bottom:14px;}
.f-field{margin-bottom:10px;}
.f-lbl{font-size:10px;font-weight:600;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px;}
.f-input{width:100%;border:1px solid #dadce0;border-radius:6px;padding:7px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:#202124;background:#f8f9fa;outline:none;transition:border-color .12px;}
.f-input:focus{border-color:#1a73e8;background:#fff;}
.f-input.large{min-height:64px;resize:vertical;}
.f-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:7px;margin-top:12px;}
.btn-primary{flex:1;background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{background:#1765cc;}
.btn-primary:disabled{background:#a8c7fa;cursor:not-allowed;}
.btn-cancel{flex:1;background:#f1f3f4;color:#3c4043;border:1px solid #dadce0;border-radius:6px;padding:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-cancel:hover{background:#e0e0e0;}
.modal-status{font-size:11px;text-align:center;margin-top:5px;min-height:13px;}

/* ══════════════════════════ TOAST ══════════════════════════ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#202124;color:#fff;border-radius:8px;
  padding:9px 18px;font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  transition:transform .25s ease,opacity .25s;opacity:0;z-index:999;
  white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{background:#1e8e3e;}
.toast.error{background:#d93025;}

/* ══════════════════════════ RESPONSIVE ══════════════════════════ */
@media(max-width:900px){
  .right-col{display:none;}
  .task-centre{flex:1;}
}
@media(max-width:640px){
  html,body{overflow:auto;}
  #app{height:auto;min-height:100vh;overflow:visible;}
  .app-body{flex-direction:column;overflow:visible;height:auto;}
  .content-area{flex-direction:column;overflow:visible;height:auto;padding:8px 10px 16px;}
  .task-sidebar{flex:none;width:100%;border-right:none;border-bottom:1px solid #e0e0e0;flex-direction:row;flex-wrap:wrap;padding:8px;gap:4px;}
  .sidebar-stats{display:none;}
  .task-grid.multi{grid-template-columns:1fr;}
  .tb-meta{display:none;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">M</div>
    <div class="auth-title">MIE Tasks</div>
    <div class="auth-sub">Sign in to view and manage your tasks.</div>
    <button class="connect-btn" id="connect-btn">Connect Google</button>
  </div>
</div>

<!-- SPINNER -->
<div id="loading-wrap" class="spinner-wrap" style="display:none;">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#5f6368;margin-top:4px;">Loading tasks…</div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-left">
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>
        Dashboard
      </button>
      <div class="tb-sep-line"></div>
      <div class="tb-logo">M</div>
      <span class="tb-brand">MIE</span>
      <span class="tb-slash">/</span>
      <span class="tb-page">Tasks</span>
    </div>
    <div class="tb-right">
      <div class="tb-meta">
        <span id="wb-date"></span>
        <span class="tb-sep">·</span>
        <span id="wb-time"></span>
        <span class="tb-sep">·</span>
        <div class="tb-weather"><span id="wb-icon" style="font-size:14px;"></span><span id="wb-temp"></span></div>
      </div>
      <button class="signout-btn" id="signout-btn">Sign out</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="app-body">

    <!-- LEFT SIDEBAR -->
    <div class="task-sidebar" id="task-sidebar">
      <div class="sidebar-sec">Views</div>
      <button class="tl-item active" data-filter="all" id="tl-all">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,8 6,12 14,4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All tasks
        <span class="tl-count" id="count-all">0</span>
      </button>
      <button class="tl-item" data-filter="today" id="tl-today">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="1"/><line x1="1" y1="6" x2="15" y2="6"/><line x1="5" y1="1" x2="5" y2="3"/><line x1="11" y1="1" x2="11" y2="3"/></svg>
        Due Today
        <span class="tl-count" id="count-today">0</span>
      </button>
      <button class="tl-item" data-filter="overdue" id="tl-overdue">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="4.5" x2="8" y2="8.5" stroke-linecap="round"/><circle cx="8" cy="10.5" r=".7" fill="currentColor" stroke="none"/></svg>
        Overdue

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';
var BACKEND='https://api.mie.today';
var DASHBOARD='/dashboard';

var authWrap=document.getElementById('auth-wrap');
var loadWrap=document.getElementById('loading-wrap');
var appEl=document.getElementById('app');

var allTasks=[];
var taskLists=[];
var currentFilter='all';
var currentChip='all';

function show(el){
  [authWrap,loadWrap,appEl].forEach(function(e){e.style.display='none';});
  if(el===appEl){appEl.style.display='flex';appEl.style.flexDirection='column';}
  else el.style.display='';
}

var toastTmr=null;
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');
  setTimeout(function(){t.classList.add('show');},10);
  if(toastTmr)clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){t.classList.remove('show');},2600);
}

function startClock(){
  function tick(){
    var n=new Date();
    document.getElementById('wb-date').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    document.getElementById('wb-time').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true,timeZoneName:'short'});
  }
  tick();setInterval(tick,30000);
}

function wIcon(c){if(c===0)return'☀️';if(c<=2)return'🌤️';if(c===3)return'☁️';if(c<=49)return'🌫️';if(c<=59)return'🌦️';if(c<=69)return'🌧️';if(c<=79)return'❄️';if(c<=82)return'🌧️';return'⛈️';}
function loadWeather(){
  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){doWeather(p.coords.latitude,p.coords.longitude);},function(){doWeather(37.7749,-122.4194);},{timeout:5000});}
  else doWeather(37.7749,-122.4194);
}
function doWeather(lat,lon){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weathercode&temperature_unit=celsius&timezone=auto')
    .then(function(r){return r.json();})
    .then(function(w){
      var c=Math.round(w.current.temperature_2m),f=Math.round(c*9/5+32);
      document.getElementById('wb-icon').textContent=wIcon(w.current.weathercode);
      document.getElementById('wb-temp').textContent=f+'°F / '+c+'°C';
    }).catch(function(){});
}

function init(){
  show(loadWrap);
  fetch(BACKEND+'/api/me/status',{credentials:'include'})
    .then(function(r){if(!r.ok){show(authWrap);return null;}return r.json();})
    .then(function(d){
      if(!d)return;
      if(d.connected){show(appEl);loadTasks();startClock();loadWeather();}
      else show(authWrap);
    }).catch(function(){show(authWrap);});
}

document.getElementById('connect-btn').addEventListener('click',function(){window.location.href=BACKEND+'/auth/google';});
document.getElementById('signout-btn').addEventListener('click',function(){
  fetch(BACKEND+'/auth/logout',{method:'POST',credentials:'include'}).catch(function(){}).finally(function(){show(authWrap);});
});
document.getElementById('back-btn').addEventListener('click',function(){window.location.href=DASHBOARD;});

document.querySelectorAll('.tag-chip').forEach(function(chip){
  chip.addEventListener('click',function(){
    var tag=chip.getAttribute('data-tag');
    var ta=document.getElementById('msg-input');
    chip.classList.toggle('selected');
    var val=ta.value;
    if(chip.classList.contains('selected')){
      if(val.indexOf(tag)===-1){ta.value=(tag+' '+val).trimEnd();}
    }else{
      ta.value=val.replace(tag,'').replace(/^\s+/,'').trimEnd();
    }
    updateSendBtn();
    ta.focus();
  });
});

var msgIn=document.getElementById('msg-input');
var sndBtn=document.getElementById('send-btn');
var sndSt=document.getElementById('send-status');
var filIn=document.getElementById('file-input');
var fnm=document.getElementById('fname');
var rmf=document.getElementById('rm-file');
var selFile=null;
function updateSendBtn(){sndBtn.disabled=!msgIn.value.trim()&&!selFile;}
msgIn.addEventListener('input',updateSendBtn);
filIn.addEventListener('change',function(){
  selFile=filIn.files[0]||null;
  if(selFile){fnm.textContent=selFile.name;fnm.style.display='';rmf.style.display='';}
  else{fnm.style.display='none';rmf.style.display='none';}
  updateSendBtn();
});
rmf.addEventListener('click',function(){selFile=null;filIn.value='';fnm.style.display='none';rmf.style.display='none';updateSendBtn();});
sndBtn.addEventListener('click',function(){
  var txt=msgIn.value.trim();if(!txt&&!selFile)return;
  sndBtn.disabled=true;sndSt.textContent='';
  fetch(BACKEND+'/api/me/message',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt+(selFile?'\n\n[Attachment: '+selFile.name+']':'')})})
    .then(function(r){
      if(r.ok){
        sndSt.style.color='#1e8e3e';sndSt.textContent='✅ Sent!';
        msgIn.value='';selFile=null;filIn.value='';fnm.style.display='none';rmf.style.display='none';
        document.querySelectorAll('.tag-chip.selected').forEach(function(c){c.classList.remove('selected');});
      }else{sndSt.style.color='#d93025';sndSt.textContent='❌ Failed.';}
    })
    .catch(function(){sndSt.style.color='#d93025';sndSt.textContent='❌ Error.';})
    .finally(function(){setTimeout(function(){sndSt.textContent='';updateSendBtn();},3000);});
});

document.querySelectorAll('.qa-btn[data-qa]').forEach(function(btn){
  if(btn.tagName==='A')return;
  btn.addEventListener('click',function(){
    var qa=btn.getAttribute('data-qa');
    if(qa==='tasks')return;
    window.location.href=DASHBOARD+'?mod='+qa;
  });
});

function loadTasks(){
  fetch(BACKEND+'/api/me/tasks',{credentials:'include'})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(data){
      if(!data){allTasks=[];taskLists=[];}
      else{
        taskLists=Array.isArray(data.lists)?data.lists:[];
        var raw=Array.isArray(data.tasks)?data.tasks:[];
        allTasks=raw.map(function(t){
          var lid=t.listId||t.taskListId||null;
          if(!lid&&taskLists.length===1)lid=taskLists[0].id;
          return Object.assign({},t,{listId:lid||'@default',_pending:false});
        });
      }
      updateStats();renderSidebar();renderMain();
    })
    .catch(function(){allTasks=[];taskLists=[];updateStats();renderSidebar();renderMain();});
}

function updateStats(){
  var done=allTasks.filter(function(t){return t.status==='completed';}).length;
  var todo=allTasks.filter(function(t){return t.status!=='completed';}).length;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-todo').textContent=todo;
  document.getElementById('stat-total').textContent=allTasks.length;

  var now=new Date();now.setHours(0,0,0,0);
  var todayCnt=allTasks.filter(function(t){
    if(t.status==='completed'||!t.due)return false;
    return Math.round((new Date(t.due+(t.due.includes('T')?'':'T12:00:00'))-now)/86400000)===0;
  }).length;
  var overdueCnt=allTasks.filter(function(t){
    if(t.status==='completed'||!t.due)return false;
    return new Date(t.due+(t.due.includes('T')?'':'T12:00:00'))<now;
  }).length;
  var allActive=allTasks.filter(function(t){return t.status!=='completed';}).length;

  document.getElementById('count-all').textContent=allActive;
  document.getElementById('count-today').textContent=todayCnt;
  var ob=document.getElementById('count-overdue');
  ob.textContent=overdueCnt;
  ob.className='tl-count'+(overdueCnt>0?' red-badge':'');
}

function renderSidebar(){
  ['all','today','overdue'].forEach(function(f){
    var el=document.getElementById('tl-'+f);
    if(el)el.className='tl-item'+(currentFilter===f?' active':'');
  });
  var con=document.getElementById('list-sidebar-items');con.innerHTML='';
  taskLists.forEach(function(l){
    var cnt=allTasks.filter(function(t){return t.listId===l.id&&t.status!=='completed';}).length;
    var btn=document.createElement('button');
    btn.className='tl-item'+(currentFilter===l.id?' active':'');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/></svg>'
      +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">'+escHtml(l.title)+'</span>'
      +'<span class="tl-count">'+cnt+'</span>';
    btn.addEventListener('click',function(){setFilter(l.id);});
    con.appendChild(btn);
  });
}

function setFilter(f){currentFilter=f;renderSidebar();renderMain();}
['all','today','overdue'].forEach(function(f){
  var el=document.getElementById('tl-'+f);
  if(el)el.addEventListener('click',function(){setFilter(f);});
});

document.querySelectorAll('.chip').forEach(function(c){
  c.addEventListener('click',function(){
    currentChip=c.getAttribute('data-chip');
    document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('active');});
    c.classList.add('active');
    renderMain();
  });
});

function renderMain(){
  var grid=document.getElementById('task-grid');grid.innerHTML='';
  var now=new Date();now.setHours(0,0,0,0);

  var listsToRender=[];
  if(currentFilter==='all'){
    listsToRender=taskLists.length?taskLists.slice():[{id:'@default',title:'My Tasks'}];
  }else if(currentFilter==='today'||currentFilter==='overdue'){
    listsToRender=[{id:'__virtual__',title:currentFilter==='today'?'Due Today':'Overdue',_virtual:currentFilter}];
  }else{
    var found=taskLists.find(function(l){return l.id===currentFilter;});
    listsToRender=[found||{id:currentFilter,title:'Tasks'}];
  }

  grid.className='task-grid '+(listsToRender.length>1?'multi':'single');

  listsToRender.forEach(function(lst){
    var tasks;
    if(lst._virtual==='today'){
      tasks=allTasks.filter(function(t){
        if(!t.due)return false;
        return Math.round((new Date(t.due+(t.due.includes('T')?'':'T12:00:00'))-now)/86400000)===0;
      });
    }else if(lst._virtual==='overdue'){
      tasks=allTasks.filter(function(t){
        if(!t.due||t.status==='completed')return false;
        return new Date(t.due+(t.due.includes('T')?'':'T12:00:00'))<now;
      });
    }else{
      tasks=allTasks.filter(function(t){return t.listId===lst.id;});
    }

    var active=tasks.filter(function(t){return t.status!=='completed';});
    var done=tasks.filter(function(t){return t.status==='completed';});
    var showActive=(currentChip==='all'||currentChip==='active');
    var showDone=(currentChip==='all'||currentChip==='done');

    grid.appendChild(buildCard(lst,showActive?active:[],showDone?done:[]));
  });

  if(!grid.children.length){
    grid.innerHTML='';
    var emp=document.createElement('div');emp.className='task-list-card';
    emp.innerHTML='<div class="empty-card"><div class="empty-icon">✅</div><div class="empty-title">All caught up!</div><div class="empty-sub">No tasks match this filter.</div></div>';
    grid.appendChild(emp);
  }
}

function buildCard(lst,active,done){
  var card=document.createElement('div');card.className='task-list-card';

  var hd=document.createElement('div');hd.className='tlc-header';
  var nm=document.createElement('span');nm.className='tlc-name';nm.textContent=lst.title||'My Tasks';
  var badge=document.createElement('span');badge.className='tlc-badge';badge.textContent=active.length+' active';
  hd.appendChild(nm);hd.appendChild(badge);card.appendChild(hd);

  if(!lst._virtual){
    var addBtn=document.createElement('button');addBtn.className='tlc-add';
    addBtn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="#1a73e8" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke-linecap="round"/></svg>Add a task';
    addBtn.addEventListener('click',function(){openAddModal(lst.id);});
    card.appendChild(addBtn);
  }

  if(active.length){
    active.forEach(function(t){card.appendChild(buildRow(t));});
  }else if(!done.length){
    var e=document.createElement('div');
    e.style.cssText='padding:10px 4px;font-size:12px;color:#9aa0a6;font-style:italic;';
    e.textContent='No tasks here yet.';card.appendChild(e);
  }

  if(done.length){
    var sep=document.createElement('div');sep.className='comp-sep';card.appendChild(sep);
    var sec=document.createElement('div');sec.className='tlc-completed-sec';
    sec.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4,6 8,10 12,6"/></svg>Completed ('+done.length+')';
    var list=document.createElement('div');list.className='tlc-completed-tasks';
    done.forEach(function(t){list.appendChild(buildRow(t));});
    sec.addEventListener('click',function(){sec.classList.toggle('open');list.classList.toggle('show');});
    card.appendChild(sec);card.appendChild(list);
  }

  return card;
}

function buildRow(t){
  var isDone=t.status==='completed';
  var row=document.createElement('div');row.className='tlc-task';

  var cb=document.createElement('button');
  cb.type='button';
  cb.className='tlc-cb'+(isDone?' checked':'');
  cb.setAttribute('role','checkbox');
  cb.setAttribute('aria-checked',isDone?'true':'false');
  cb.setAttribute('aria-label',(isDone?'Unmark':'Mark complete')+': '+(t.title||'task'));

  cb.addEventListener('click',function(){
    if(t._pending)return;
    t._pending=true;
    cb.disabled=true;
    toggleTask(t,cb,row,function(){
      t._pending=false;
      cb.disabled=false;
    });
  });

  var body=document.createElement('div');body.className='tlc-task-body';
  var nm=document.createElement('div');nm.className='tlc-task-name'+(isDone?' done':'');nm.textContent=t.title||'Untitled';
  body.appendChild(nm);

  var notes=(t.notes||'').replace(/\[priority:(high|medium|low)\]/gi,'').trim();
  if(notes){
    var nd=document.createElement('div');nd.className='tlc-task-notes';nd.textContent=notes;
    body.appendChild(nd);
  }

  if(!isDone&&t.due){
    var df=fmtDue(t.due);
    if(df){
      var meta=document.createElement('div');meta.className='tlc-task-meta';
      var chip=document.createElement('span');chip.className='tlc-due-chip '+df.cls;
      chip.textContent='📅 '+df.label;
      meta.appendChild(chip);body.appendChild(meta);
    }
  }

  row.appendChild(cb);row.appendChild(body);
  return row;
}

function toggleTask(t,cb,row,onDone){
  var wasDone=t.status==='completed';
  var newStatus=wasDone?'needsAction':'completed';

  cb.classList.toggle('checked',!wasDone);
  cb.setAttribute('aria-checked',(!wasDone).toString());
  var nameEl=row.querySelector('.tlc-task-name');
  if(nameEl)nameEl.classList.toggle('done',!wasDone);
  t.status=newStatus;
  updateStats();

  function attempt(listId){
    return fetch(BACKEND+'/api/me/tasks/update',{
      method:'POST',credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({taskId:t.id,listId:listId,status:newStatus,title:t.title||'',notes:t.notes||''})
    });
  }

  attempt(t.listId||'@default')
    .then(function(r){
      if(r.status===404&&t.listId!=='@default')return attempt('@default');
      return r;
    })
    .then(function(r){
      if(r&&r.ok){
        toast(newStatus==='completed'?'✅ Task completed!':'↩ Task reopened.',newStatus==='completed'?'success':'');
        renderSidebar();renderMain();updateStats();
      }else{
        t.status=wasDone?'completed':'needsAction';
        cb.classList.toggle('checked',wasDone);
        if(nameEl)nameEl.classList.toggle('done',wasDone);
        updateStats();
        toast('Could not update task.','error');
      }
      if(onDone)onDone();
    })
    .catch(function(){
      t.status=wasDone?'completed':'needsAction';
      cb.classList.toggle('checked',wasDone);
      if(nameEl)nameEl.classList.toggle('done',wasDone);
      updateStats();
      if(onDone)onDone();
    });
}

function openAddModal(preselect){
  document.getElementById('at-title').value='';
  document.getElementById('at-notes').value='';
  document.getElementById('at-due').value='';
  document.getElementById('at-status').textContent='';
  var sel=document.getElementById('at-list');sel.innerHTML='';
  taskLists.forEach(function(l){
    var o=document.createElement('option');o.value=l.id;o.textContent=l.title||l.id;
    if(l.id===preselect)o.selected=true;
    sel.appendChild(o);
  });
  if(!taskLists.length){var o=document.createElement('option');o.value='@default';o.textContent='My Tasks';sel.appendChild(o);}
  document.getElementById('add-task-modal').classList.remove('hidden');
  setTimeout(function(){document.getElementById('at-title').focus();},60);
}
document.getElementById('add-task-btn2').addEventListener('click',function(){openAddModal(null);});
document.getElementById('at-cancel').addEventListener('click',function(){document.getElementById('add-task-modal').classList.add('hidden');});
document.getElementById('add-task-modal').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
document.getElementById('at-save').addEventListener('click',function(){
  var title=document.getElementById('at-title').value.trim();
  var notes=document.getElementById('at-notes').value.trim();
  var due=document.getElementById('at-due').value;
  var listId=document.getElementById('at-list').value||'@default';
  var st=document.getElementById('at-status');
  if(!title){st.style.color='#d93025';st.textContent='Title is required.';return;}
  var payload={title:title,listId:listId};
  if(notes)payload.notes=notes;
  if(due)payload.due=due+'T00:00:00.000Z';
  document.getElementById('at-save').disabled=true;st.style.color='#5f6368';st.textContent='Saving…';
  fetch(BACKEND+'/api/me/tasks/create',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){
      if(r.ok){st.style.color='#1e8e3e';st.textContent='✅ Added!';setTimeout(function(){document.getElementById('add-task-modal').classList.add('hidden');st.textContent='';loadTasks();},500);}
      else{st.style.color='#d93025';st.textContent='❌ Failed.';}
    })
    .catch(function(){st.style.color='#d93025';st.textContent='❌ Network error.';})
    .finally(function(){document.getElementById('at-save').disabled=false;});
});

document.getElementById('tl-create-btn').addEventListener('click',function(){
  document.getElementById('nl-name').value='';document.getElementById('nl-status').textContent='';
  document.getElementById('new-list-modal').classList.remove('hidden');
  setTimeout(function(){document.getElementById('nl-name').focus();},60);
});
document.getElementById('nl-cancel').addEventListener('click',function(){document.getElementById('new-list-modal').classList.add('hidden');});
document.getElementById('new-list-modal').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
document.getElementById('nl-save').addEventListener('click',function(){
  var name=document.getElementById('nl-name').value.trim();
  var st=document.getElementById('nl-status');
  if(!name){st.style.color='#d93025';st.textContent='Name is required.';return;}
  document.getElementById('nl-save').disabled=true;st.style.color='#5f6368';st.textContent='Creating…';
  fetch(BACKEND+'/api/me/tasks/lists/create',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:name})})
    .then(function(r){
      if(r.ok){st.style.color='#1e8e3e';st.textContent='✅ Created!';setTimeout(function(){document.getElementById('new-list-modal').classList.add('hidden');st.textContent='';loadTasks();},500);}
      else{st.style.color='#d93025';st.textContent='❌ Failed.';}
    })
    .catch(function(){st.style.color='#d93025';st.textContent='❌ Network error.';})
    .finally(function(){document.getElementById('nl-save').disabled=false;});
});

function fmtDue(d){
  if(!d)return null;
  var dt=new Date(d+(d.includes('T')?'':'T12:00:00')),now=new Date();now.setHours(0,0,0,0);
  var diff=Math.round((dt-now)/86400000);
  if(diff<0)return{label:'Overdue',cls:'overdue'};
  if(diff===0)return{label:'Today',cls:'today'};
  if(diff===1)return{label:'Tomorrow',cls:'future'};
  return{label:dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}),cls:'future'};
}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

init();
