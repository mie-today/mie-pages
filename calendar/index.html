<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAIVE - Calendar</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF; --bg2: #FAFAF8; --bg3: #F2F1EE;
      --txt: #111111; --txt2: #5F5E5A; --txt3: #999896;
      --blue: #1C7ED6; --teal: #1D9E75;
      --b1: rgba(0,0,0,0.07); --b2: rgba(0,0,0,0.12);
      --red: #E24B4A; --purple: #534AB7; --amber: #EF9F27;
      --r: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg2);
      color: var(--txt);
      font-size: 13px;
    }

    /* 전체 앱 레이아웃 */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh; /* 화면 꽉 차게 고정 */
    }

    /* 상단 탑바 (52px 고정) */
    .topbar {
      flex-shrink: 0;
      height: 52px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg);
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .logo span { color: var(--blue); }
    .topbar-divider { width: 1px; height: 14px; background: var(--b1); }
    .welcome-msg { font-size: 13px; color: var(--txt2); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .clock-weather-wrap { font-size: 13px; color: var(--txt2); display: flex; gap: 8px; }
    .avatar-circle { width: 26px; height: 26px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; }

    /* 중간 메인 컨테이너 */
    .main-container {
      display: flex;
      flex: 1; /* 남은 높이 모두 차지 */
      overflow: hidden; /* 내부 스크롤 사용을 위해 숨김 */
    }

    /* -------------------------------------
       왼쪽 캘린더 (60%) 
    ------------------------------------- */
    .calendar-pane {
      width: 60%;
      background: var(--bg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .cal-custom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
    .cal-nav-group { display: flex; align-items: center; gap: 4px; }
    .cal-nav-btn { background: var(--bg); border: 1px solid var(--b1); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; }
    .cal-header-title { font-size: 16px; font-weight: 600; margin: 0 8px; min-width: 120px; }
    .cal-controls-right { display: flex; gap: 8px; }
    .cal-view-dropdown { padding: 4px 8px; border: 1px solid var(--b1); border-radius: 6px; background: var(--bg); }
    
    .fc-wrapper { flex: 1; border: 1px solid var(--b1); border-radius: var(--r); padding: 12px; overflow: hidden; background: var(--bg); }
    .fc { height: 100% !important; }
    .fc-theme-standard th { background: var(--bg2); padding: 6px 0 !important; font-size: 11px; font-weight: 600; color: var(--txt2); }
    .fc-daygrid-day-number { font-size: 11px; color: var(--txt2); }

    /* -------------------------------------
       오른쪽 패널 (40%) - 3단 구조
    ------------------------------------- */
    .right-panel {
      width: 40%;
      border-left: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      background: var(--bg2); /* 배경을 살짝 어둡게 주어 카드 구분을 명확히 함 */
      overflow-y: auto; /* 패널 내부 스크롤 */
      padding: 16px;
      gap: 16px; /* 3개 패널 사이 간격 */
    }

    /* 개별 패널 카드 스타일 */
    .panel-card {
      background: var(--bg);
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0; /* 카드가 찌그러지지 않게 방지 */
    }

    .panel-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--txt);
    }

    .panel-items-stack { display: flex; flex-direction: column; gap: 8px; }

    /* 이벤트 및 태스크 아이템 디자인 */
    .rt-event-pill { background: var(--bg2); padding: 8px; border-radius: 6px; display: flex; flex-direction: column; cursor: pointer; }
    .rt-event-time { font-size: 11px; color: var(--txt2); }
    .rt-event-title { font-size: 12px; font-weight: 600; margin-top: 2px; }
    
    .rt-task-row { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; }
    .rt-task-text { font-size: 12px; color: var(--txt); }

    /* Send Message / +Add 탭 메뉴 */
    .panel-nav-tabs { display: flex; border-bottom: 1px solid var(--b1); margin-bottom: 12px; }
    .p-tab { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 500; color: var(--txt2); cursor: pointer; border-bottom: 2px solid transparent; }
    .p-tab.active-tab { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

    /* 폼 요소 */
    .f-textarea, .f-input, .f-select { width: 100%; background: var(--bg2); border: 1px solid var(--b1); border-radius: 6px; padding: 8px; font-size: 12px; font-family: inherit; margin-bottom: 8px; outline: none; }
    .f-textarea:focus, .f-input:focus { border-color: var(--blue); background: var(--bg); }
    
    /* Attach 및 Send Message 버튼 위치 조정 */
    .msg-action-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-secondary { background: var(--bg2); border: 1px solid var(--b1); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-primary { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; }

    /* -------------------------------------
       하단 메뉴 (48px 고정) 
    ------------------------------------- */
    .bottom-navbar {
      flex-shrink: 0; /* 축소 방지 */
      height: 48px;
      border-top: 1px solid var(--b1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: var(--bg);
      z-index: 10;
    }
    .b-nav-item { font-size: 13px; font-weight: 500; color: var(--txt2); text-decoration: none; padding: 14px 4px; border-bottom: 2px solid transparent; }
    .b-nav-item:hover { color: var(--txt); }
    .b-nav-item.active-nav { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  </style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">KL<span>AI</span>VE</div>
      <div class="topbar-divider"></div>
      <div class="welcome-msg">Welcome, User</div>
    </div>
    <div class="topbar-right">
      <div class="clock-weather-wrap">
        <span>10:30 AM</span>
        <span class="topbar-divider"></span>
        <span>🌤 64°F</span>
      </div>
      <div class="avatar-circle">U</div>
    </div>
  </header>

  <div class="main-container">
    
    <section class="calendar-pane">
      <div class="cal-custom-header">
        <div class="cal-nav-group">
          <button class="cal-nav-btn" onclick="calendar.prev()">‹</button>
          <div class="cal-header-title">June 2026</div>
          <button class="cal-nav-btn" onclick="calendar.next()">›</button>
        </div>
        <div class="cal-controls-right">
          <select class="cal-view-dropdown" onchange="calendar.changeView(this.value)">
            <option value="dayGridMonth">Month</option>
            <option value="timeGridWeek">Week</option>
          </select>
        </div>
      </div>
      <div class="fc-wrapper">
        <div id="calendar-root"></div>
      </div>
    </section>

    <aside class="right-panel">
      
      <div class="panel-card">
        <div class="panel-card-header">
          <span>Today's Events</span>
          <span style="font-size:12px; color:var(--txt3); font-weight:400;">Jun 19, 2026</span>
        </div>
        <div class="panel-items-stack">
          <div class="rt-event-pill" style="border-left: 3px solid var(--blue);">
            <span class="rt-event-time">10:00 AM - 11:30 AM</span>
            <span class="rt-event-title">Team Strategy Meeting</span>
          </div>
          <div class="rt-event-pill" style="border-left: 3px solid var(--purple);">
            <span class="rt-event-time">2:00 PM - 3:00 PM</span>
            <span class="rt-event-title">Client Review Sync</span>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-card-header">
          <span>Tasks</span>
          <select style="border:none; outline:none; font-size:12px; color:var(--txt2); cursor:pointer;">
            <option>All List ▾</option>
          </select>
        </div>
        <div class="panel-items-stack">
          <div class="rt-task-row">
            <input type="checkbox">
            <span class="rt-task-text">Update Q3 Financial Report</span>
          </div>
          <div class="rt-task-row">
            <input type="checkbox">
            <span class="rt-task-text">Review new design mockups</span>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-nav-tabs">
          <div class="p-tab active-tab">Send Message</div>
          <div class="p-tab">+ Add</div>
        </div>
        
        <div>
          <textarea class="f-textarea" rows="4" placeholder="Type your message..."></textarea>
          
          <div style="margin-bottom: 12px; font-size:12px; color:var(--txt2);">
            <input type="checkbox" id="draft-chk"> <label for="draft-chk">Save as draft</label>
          </div>
          
          <div class="msg-action-area">
            <button class="btn-secondary">📎 Attach File</button>
            <button class="btn-primary">Send Message</button>
          </div>
        </div>

      </div>

    </aside>
  </div>

  <nav class="bottom-navbar">
    <a href="/dashboard" class="b-nav-item">Overview</a>
    <a href="/calendar" class="b-nav-item active-nav">Calendar</a>
    <a href="/finance" class="b-nav-item">Finance</a>
    <a href="/health" class="b-nav-item">Health</a>
    <a href="/task" class="b-nav-item">Tasks</a>
    <a href="/documents" class="b-nav-item">Documents</a>
    <a href="/settings" class="b-nav-item">Settings</a>
  </nav>

</div>

<script>
  // FullCalendar 초기화 로직
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar-root');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: false,
      height: '100%',
      events: [
        { title: 'Team Strategy Meeting', start: '2026-06-19T10:00:00', color: '#1C7ED6' },
        { title: 'Client Review Sync', start: '2026-06-19T14:00:00', color: '#534AB7' }
      ]
    });
    calendar.render();
    window.calendar = calendar;
  });
</script>

</body>
</html>
