<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Row Travel Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0079bf;
            --list-bg: #ebecf0;
            --card-bg: #ffffff;
            --text-color: #172b4d;
            --accent-color: #00c2e0;
            --danger-color: #eb5a46;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
            gap: 15px;
        }

        .title-area { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        
        .board-title-input {
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
            width: 100%;
            max-width: 450px;
            transition: all 0.2s ease;
        }
        .board-title-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
        }

        .btn-map-master {
            background-color: #ff9f1a;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }

        .export-controls { display: flex; gap: 8px; flex-shrink: 0; }

        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: white;
        }

        .btn-share { background-color: #5aac44; }
        .btn-clear { background-color: #6b778c; }
        .btn-pdf { background-color: #e04444; }
        .btn-excel { background-color: #217346; }

        .top-row-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            align-content: start;
        }

        .list {
            background-color: var(--list-bg);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            max-height: 450px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: opacity 0.15s ease;
        }

        [data-list-id="rules"] .card-container,
        [data-list-id="backlog"] .card-container,
        [data-list-id="done"] .card-container {
            max-height: 145px; 
            overflow-y: auto;
        }

        .add-day-placeholder {
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            min-height: 120px;
            transition: all 0.2s ease;
        }
        .add-day-placeholder:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        .add-day-placeholder span { font-size: 28px; margin-bottom: 5px; }

        /* --- Updated List Header with Column Grips --- */
        .list-header-container {
            display: flex;
            align-items: center;
            background: #e2e4e6;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            padding-right: 8px;
            gap: 2px;
        }

        .list-grip {
            color: #7a869a;
            cursor: grab;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 4px 0px 10px;
            user-select: none;
            flex-shrink: 0;
        }
        .list-grip:active { cursor: grabbing; }

        .list-header-input {
            border: none;
            background: transparent;
            padding: 10px 8px 2px 4px;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .btn-delete-list {
            background: transparent;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            padding: 4px;
            flex-shrink: 0;
        }
        .btn-delete-list:hover { color: var(--danger-color); }

        .list-subtitle-input {
            border: none;
            background: #e2e4e6;
            padding: 0 12px 8px 12px;
            font-size: 11px;
            color: #5e6c84;
            border-bottom: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .card-container { padding: 6px; overflow-y: auto; flex-grow: 1; min-height: 40px; }

        /* --- Internal Card Control Dock --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .card-left-dock {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .card-grip {
            color: #7a869a;
            cursor: grab;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }
        .card-grip:active { cursor: grabbing; }

        .btn-delete-card {
            border: none;
            background: transparent;
            color: #a0a0a0;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            padding: 0 2px;
        }
        .btn-delete-card:hover { color: var(--danger-color); }

        .card-main-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .card-header-row { display: flex; justify-content: space-between; gap: 6px; align-items: center; }
        .card-title-input { border: none; font-weight: 600; font-size: 13px; width: 100%; outline: none; background: transparent; }
        
        .card-actions { display: flex; align-items: center; flex-shrink: 0; }
        .map-link { text-decoration: none; font-size: 13px; cursor: pointer; }

        .card-notes-input { border: none; font-size: 11px; color: #5e6c84; font-style: italic; width: 100%; outline: none; margin-top: 4px; background: transparent; }
        .card.allergy { border-left: 4px solid var(--danger-color); background-color: #fff9f8; }

        .add-card-form { padding: 6px; border-top: 1px solid #ddd; display: flex; gap: 4px; }
        .add-card-input { flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
        .add-card-btn { background-color: #5aac44; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <input type="text" id="boardTitleInput" class="board-title-input" value="🗺️ Multi-Row Travel Workspace" oninput="saveBoardToStorage()">
            <a href="https://maps.google.com" target="_blank" class="btn-map-master">📍 Open Connected Map</a>
        </div>
        <div class="export-controls">
            <button class="btn btn-share" onclick="shareBoardURL()">🔗 Share Board URL</button>
            <button class="btn btn-clear" onclick="resetBoard()">Reset App</button>
            <button class="btn btn-pdf" onclick="window.print()">PDF</button>
            <button class="btn btn-excel" onclick="exportToExcel()">Spreadsheet</button>
        </div>
    </header>

    <div class="top-row-grid" id="topGrid"></div>
    <div class="days-grid" id="daysGrid"></div>

    <script>
        let draggedCard = null;
        let draggedList = null;

        const defaultLayout = [
            { id: "rules", title: "📌 Rules & Notes", subtitle: "Core Parameters", cards: [{ title: "⚠️ Dietary Safety", notes: "Trip Parameter", type: "allergy" }] },
            { id: "backlog", title: "🗂️ Backlog", subtitle: "Unassigned pool", cards: [{ title: "SF MOMA", notes: "Target Note", type: "" }] },
            { id: "done", title: "✅ Done", subtitle: "Completed Targets", cards: [] },
            { id: "day1", title: "📅 Day 1", subtitle: "Arrival & SF Art", cards: [] },
            { id: "day2", title: "📅 Day 2", subtitle: "Parks & Science", cards: [] },
            { id: "day3", title: "📅 Day 3", subtitle: "Edit focus...", cards: [] },
            { id: "day4", title: "📅 Day 4", subtitle: "Edit focus...", cards: [] },
            { id: "day5", title: "📅 Day 5", subtitle: "Edit focus...", cards: [] },
            { id: "day6", title: "📅 Day 6", subtitle: "Edit focus...", cards: [] },
            { id: "day7", title: "📅 Day 7", subtitle: "Edit focus...", cards: [] },
            { id: "day8", title: "📅 Day 8", subtitle: "Edit focus...", cards: [] },
            { id: "day9", title: "📅 Day 9", subtitle: "Edit focus...", cards: [] },
            { id: "day10", title: "📅 Day 10", subtitle: "Edit focus...", cards: [] }
        ];

        function compressLayout(boardState) {
            return {
                t: boardState.boardTitle,
                l: boardState.layout.map(list => ({
                    i: list.id,
                    t: list.title,
                    s: list.subtitle,
                    c: list.cards.map(card => ({
                        t: card.title,
                        n: card.notes,
                        y: card.type
                    }))
                }))
            };
        }

        function decompressLayout(data) {
            if (!data) return null;
            if (Array.isArray(data)) {
                return { boardTitle: "🗺️ Multi-Row Travel Workspace", layout: data };
            }
            if (!data.l) return null;
            
            return {
                boardTitle: data.t || "🗺️ Multi-Row Travel Workspace",
                layout: data.l.map(list => ({
                    id: list.i,
                    title: list.t,
                    subtitle: list.s,
                    cards: (list.c || []).map(card => ({
                        title: card.t,
                        notes: card.n,
                        type: card.y
                    }))
                }))
            };
        }

        function serializeBoard() {
            const layoutStructure = [];
            document.getElementById('topGrid').querySelectorAll('.list').forEach(list => layoutStructure.push(serializeListElement(list)));
            document.getElementById('daysGrid').querySelectorAll('.list').forEach(list => layoutStructure.push(serializeListElement(list)));
            return {
                boardTitle: document.getElementById('boardTitleInput').value,
                layout: layoutStructure
            };
        }

        function serializeListElement(list) {
            const cardArray = [];
            list.querySelectorAll('.card').forEach(card => {
                cardArray.push({
                    title: card.querySelector('.card-title-input').value,
                    notes: card.querySelector('.card-notes-input').value,
                    type: card.classList.contains('allergy') ? 'allergy' : ''
                });
            });
            return {
                id: list.getAttribute('data-list-id'),
                title: list.querySelector('.list-header-input').value,
                subtitle: list.querySelector('.list-subtitle-input').value,
                cards: cardArray
            };
        }

        function saveBoardToStorage() {
            localStorage.setItem('sf_travel_board_state_v2', JSON.stringify(serializeBoard()));
        }

        function shareBoardURL() {
            const currentData = serializeBoard();
            const compressed = compressLayout(currentData);
            const base64Str = btoa(encodeURIComponent(JSON.stringify(compressed)));
            const shareURL = window.location.origin + window.location.pathname + '#data=' + base64Str;
            
            navigator.clipboard.writeText(shareURL).then(() => {
                alert("📋 Shareable URL successfully copied to clipboard! Paste it anywhere to share.");
            }).catch(() => {
                prompt("Copy your board URL from here:", shareURL);
            });
        }

        function addNewDayColumn() {
            const currentData = serializeBoard();
            const onlyDays = currentData.layout.filter(item => item.id.startsWith('day'));
            
            let maxDayNum = 0;
            onlyDays.forEach(day => {
                const num = parseInt(day.id.replace('day', ''));
                if(!isNaN(num) && num > maxDayNum) maxDayNum = num;
            });
            
            const targetNextDay = maxDayNum + 1;
            currentData.layout.push({
                id: `day${targetNextDay}`,
                title: `📅 Day ${targetNextDay}`,
                subtitle: "Edit focus...",
                cards: []
            });

            localStorage.setItem('sf_travel_board_state_v2', JSON.stringify(currentData));
            loadBoardFromStorage();
        }

        function deleteColumnBox(listId) {
            if (confirm("Are you sure you want to completely delete this day box/column?")) {
                const currentData = serializeBoard();
                currentData.layout = currentData.layout.filter(item => item.id !== listId);
                localStorage.setItem('sf_travel_board_state_v2', JSON.stringify(currentData));
                loadBoardFromStorage();
            }
        }

        // Setup the workspace grid row drops safely
        function setupGridTrackDragging(grid) {
            grid.addEventListener('dragover', (e) => {
                if (!draggedList) return;
                e.preventDefault();
                
                const draggableElements = [...grid.querySelectorAll('.list')].filter(el => el !== draggedList);
                let closestElement = null;
                let shortestDistance = Infinity;
                
                draggableElements.forEach(child => {
                    const box = child.getBoundingClientRect();
                    const centerX = box.left + box.width / 2;
                    const centerY = box.top + box.height / 2;
                    const distance = Math.hypot(e.clientX - centerX, e.clientY - centerY);
                    
                    if (distance < shortestDistance) {
                        shortestDistance = distance;
                        const isBefore = (e.clientY < centerY) || (Math.abs(e.clientY - centerY) < box.height/2 && e.clientX < centerX);
                        closestElement = isBefore ? child : child.nextSibling;
                    }
                });
                
                if (closestElement) {
                    grid.insertBefore(draggedList, closestElement);
                } else {
                    const placeholder = grid.querySelector('.add-day-placeholder');
                    if (placeholder) {
                        grid.insertBefore(draggedList, placeholder);
                    } else {
                        grid.appendChild(draggedList);
                    }
                }
            });
        }

        function loadBoardFromStorage() {
            let boardState = null;

            if (window.location.hash && window.location.hash.startsWith('#data=')) {
                try {
                    const base64 = window.location.hash.replace('#data=', '');
                    const decrypted = JSON.parse(decodeURIComponent(atob(base64)));
                    boardState = decompressLayout(decrypted);
                    if (boardState) {
                        localStorage.setItem('sf_travel_board_state_v2', JSON.stringify(boardState));
                        window.location.hash = ''; 
                    }
                } catch(e) {
                    console.error("URL package loading error", e);
                }
            }

            if (!boardState) {
                try {
                    const rawData = localStorage.getItem('sf_travel_board_state_v2') || localStorage.getItem('sf_travel_board_state');
                    if (rawData) {
                        const parsed = JSON.parse(rawData);
                        if (parsed.boardTitle || Array.isArray(parsed)) {
                            boardState = decompressLayout(parsed) || parsed;
                        }
                    }
                } catch(e) {
                    console.error("Local storage restoration normalization handled", e);
                }
            }

            if (!boardState || !boardState.layout) {
                boardState = { boardTitle: "🗺️ Multi-Row Travel Workspace", layout: defaultLayout };
            }
            
            document.getElementById('boardTitleInput').value = boardState.boardTitle;

            const topGrid = document.getElementById('topGrid');
            const daysGrid = document.getElementById('daysGrid');
            
            topGrid.innerHTML = '';
            daysGrid.innerHTML = '';

            boardState.layout.forEach(item => {
                const node = buildListNode(item);
                if(['rules', 'backlog', 'done'].includes(item.id)) {
                    topGrid.appendChild(node);
                } else {
                    daysGrid.appendChild(node);
                }
            });

            const plusSlot = document.createElement('div');
            plusSlot.className = 'add-day-placeholder';
            plusSlot.innerHTML = `<span>+</span>Add New Day Column`;
            plusSlot.onclick = addNewDayColumn;
            topGrid.appendChild(plusSlot);

            // Bind grid listeners
            setupGridTrackDragging(topGrid);
            setupGridTrackDragging(daysGrid);
        }

        function buildListNode(data) {
            const list = document.createElement('div');
            list.className = 'list';
            list.setAttribute('data-list-id', data.id);
            
            // Dynamic Handle Grab Execution
            list.addEventListener('dragstart', (e) => {
                if (draggedCard) return; 
                draggedList = list;
                list.style.opacity = '0.5';
                e.dataTransfer.effectAllowed = 'move';
            });

            list.addEventListener('dragend', () => {
                list.removeAttribute('draggable');
                draggedList = null;
                list.style.opacity = '1';
                saveBoardToStorage();
            });

            // Prevent card layers from blocking parent box dragging validation
            list.addEventListener('dragover', (e) => {
                if (draggedList) e.preventDefault();
            });

            const headerContainer = document.createElement('div');
            headerContainer.className = 'list-header-container';

            const listGrip = document.createElement('div');
            listGrip.className = 'list-grip';
            listGrip.innerHTML = '⋮⋮';
            
            // Activate dragging ONLY when interacting with handle
            listGrip.addEventListener('mousedown', () => {
                list.setAttribute('draggable', 'true');
            });
            listGrip.addEventListener('mouseup', () => {
                if(!draggedList) list.removeAttribute('draggable');
            });

            headerContainer.appendChild(listGrip);

            const hIn = document.createElement('input');
            hIn.className = 'list-header-input';
            hIn.value = data.title;
            hIn.addEventListener('input', saveBoardToStorage);
            headerContainer.appendChild(hIn);

            if (!['rules', 'backlog', 'done'].includes(data.id)) {
                const delListBtn = document.createElement('button');
                delListBtn.className = 'btn-delete-list';
                delListBtn.innerHTML = '✕';
                delListBtn.title = "Delete entire box";
                delListBtn.onclick = () => deleteColumnBox(data.id);
                headerContainer.appendChild(delListBtn);
            }

            const sIn = document.createElement('input');
            sIn.className = 'list-subtitle-input';
            sIn.value = data.subtitle;
            sIn.addEventListener('input', saveBoardToStorage);

            const container = document.createElement('div');
            container.className = 'card-container';
            (data.cards || []).forEach(cData => container.appendChild(buildCardNode(cData, data.id)));

            container.addEventListener('dragover', (e) => {
                if (draggedCard || draggedList) {
                    e.preventDefault();
                    if (draggedCard) e.dataTransfer.dropEffect = 'move';
                }
            });

            container.addEventListener('drop', (e) => {
                if (!draggedCard) return;
                e.preventDefault();

                const targetCard = e.target.closest('.card');
                if (targetCard && targetCard !== draggedCard) {
                    const rect = targetCard.getBoundingClientRect();
                    const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
                    container.insertBefore(draggedCard, next ? targetCard.nextSibling : targetCard);
                } else {
                    container.appendChild(draggedCard);
                }

                const targetListId = list.getAttribute('data-list-id');
                let mapLink = draggedCard.querySelector('.map-link');

                if (targetListId === 'rules') {
                    if (mapLink) mapLink.remove();
                } else {
                    if (!mapLink) {
                        mapLink = document.createElement('a');
                        mapLink.className = 'map-link';
                        mapLink.target = '_blank';
                        mapLink.textContent = '📍';
                        const tVal = draggedCard.querySelector('.card-title-input').value;
                        mapLink.href = `https://maps.google.com/?q=${encodeURIComponent(tVal)}`;
                        draggedCard.querySelector('.card-actions').insertBefore(mapLink, draggedCard.querySelector('.btn-delete-card'));
                    }
                }
                saveBoardToStorage();
            });

            const form = document.createElement('div');
            form.className = 'add-card-form';
            const formInput = document.createElement('input');
            formInput.className = 'add-card-input';
            formInput.placeholder = "Add activity...";
            
            const formBtn = document.createElement('button');
            formBtn.className = 'add-card-btn';
            formBtn.textContent = "Add";

            const addCardAction = () => {
                if(!formInput.value.trim()) return;
                container.appendChild(buildCardNode({ title: formInput.value.trim(), notes: '', type: '' }, data.id));
                formInput.value = '';
                saveBoardToStorage();
            };

            formBtn.onclick = addCardAction;
            formInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addCardAction(); });

            form.appendChild(formInput);
            form.appendChild(formBtn);
            list.appendChild(headerContainer);
            list.appendChild(sIn);
            list.appendChild(container);
            list.appendChild(form);
            return list;
        }

        function buildCardNode(cData, listId) {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('draggable', 'true');
            if(cData.type) card.classList.add(cData.type);

            card.addEventListener('dragstart', (e) => {
                draggedCard = card;
                card.style.opacity = '0.4';
                e.dataTransfer.effectAllowed = 'move';
                e.stopPropagation(); 
            });

            card.addEventListener('dragend', (e) => {
                draggedCard = null;
                card.style.opacity = '1';
                e.stopPropagation();
            });

            const leftDock = document.createElement('div');
            leftDock.className = 'card-left-dock';

            const grip = document.createElement('div');
            grip.className = 'card-grip';
            grip.innerHTML = '⋮⋮';

            const del = document.createElement('button');
            del.className = 'btn-delete-card';
            del.textContent = '✕';
            del.title = "Delete Activity";
            del.onclick = () => { card.remove(); saveBoardToStorage(); };

            leftDock.appendChild(grip);
            leftDock.appendChild(del);

            const mainBody = document.createElement('div');
            mainBody.className = 'card-main-body';

            const row = document.createElement('div');
            row.className = 'card-header-row';

            const tIn = document.createElement('input');
            tIn.className = 'card-title-input';
            tIn.value = cData.title;
            tIn.addEventListener('input', (e) => {
                saveBoardToStorage();
                const mapLink = card.querySelector('.map-link');
                if (mapLink) {
                    mapLink.href = `https://maps.google.com/?q=${encodeURIComponent(e.target.value)}`;
                }
            });

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            if(listId !== 'rules') {
                const mapLink = document.createElement('a');
                mapLink.className = 'map-link';
                mapLink.target = '_blank';
                mapLink.textContent = '📍';
                mapLink.href = `https://maps.google.com/?q=${encodeURIComponent(cData.title)}`;
                actions.appendChild(mapLink);
            }

            row.appendChild(tIn);
            row.appendChild(actions);

            const nIn = document.createElement('input');
            nIn.className = 'card-notes-input';
            nIn.value = cData.notes;
            nIn.addEventListener('input', saveBoardToStorage);

            mainBody.appendChild(row);
            mainBody.appendChild(nIn);
            
            card.appendChild(leftDock);
            card.appendChild(mainBody);
            return card;
        }

        function resetBoard() {
            if(confirm("Completely reset workspace layout back to standard itinerary template?")) {
                localStorage.removeItem('sf_travel_board_state_v2');
                localStorage.removeItem('sf_travel_board_state');
                loadBoardFromStorage();
            }
        }

        window.onload = loadBoardFromStorage;

        function exportToExcel() {
            const data = [];
            document.querySelectorAll('.list').forEach(list => {
                const title = list.querySelector('.list-header-input').value;
                list.querySelectorAll('.card').forEach(card => {
                    data.push({
                        TimelineSection: title,
                        ActivityName: card.querySelector('.card-title-input').value,
                        Notes: card.querySelector('.card-notes-input').value
                    });
                });
            });
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Workspace");
            XLSX.writeFile(workbook, "Travel_Grid_Data.xlsx");
        }
    </script>
