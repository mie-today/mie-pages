<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Row Travel Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0079bf;
            --list-bg: #ebecf0;
            --card-bg: #ffffff;
            --text-color: #172b4d;
            --accent-color: #00c2e0;
            --danger-color: #eb5a46;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto; /* Allows workspace to scale down naturally on rows 3 & 4 */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .title-area { display: flex; align-items: center; gap: 15px; }
        h1 { color: white; margin: 0; font-size: 22px; }

        .btn-map-master {
            background-color: #ff9f1a;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }

        .export-controls { display: flex; gap: 8px; }

        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: white;
        }

        .btn-share { background-color: #5aac44; }
        .btn-import { background-color: #026aa7; }
        .btn-clear { background-color: #6b778c; }
        .btn-pdf { background-color: #e04444; }
        .btn-excel { background-color: #217346; }

        .sync-hub {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .sync-hub h3 { margin: 0 0 10px 0; font-size: 14px; }
        .sync-hub textarea { width: 100%; height: 60px; box-sizing: border-box; font-family: monospace; font-size: 11px; margin-bottom: 10px; padding: 5px; }
        .sync-hub-buttons { display: flex; gap: 10px; }

        /* --- New Grid Framework --- */
        
        /* Row 1: Fits exactly 4 structural elements side-by-side */
        .top-row-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }

        /* Rows 2, 3, 4+: Fits exactly 5 Days per horizontal track */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            align-content: start;
        }

        .list {
            background-color: var(--list-bg);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            max-height: 450px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }

        /* Interactive Dynamic Day Slot styled to fit layout seamlessly */
        .add-day-placeholder {
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            min-height: 120px;
            transition: all 0.2s ease;
        }
        .add-day-placeholder:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        .add-day-placeholder span { font-size: 28px; margin-bottom: 5px; }

        .list-header-input {
            border: none;
            background: #e2e4e6;
            padding: 10px 12px 2px 12px;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .list-subtitle-input {
            border: none;
            background: #e2e4e6;
            padding: 0 12px 8px 12px;
            font-size: 11px;
            color: #5e6c84;
            border-bottom: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .card-container { padding: 6px; overflow-y: auto; flex-grow: 1; min-height: 40px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        .card-header-row { display: flex; justify-content: space-between; gap: 10px; }
        .card-title-input { border: none; font-weight: 600; font-size: 13px; width: 100%; outline: none; }
        
        .card-actions { display: flex; gap: 5px; }
        .map-link { text-decoration: none; font-size: 13px; }
        .btn-delete-card { border: none; background: transparent; color: #a0a0a0; cursor: pointer; font-weight: bold;}
        .btn-delete-card:hover { color: var(--danger-color); }

        .card-notes-input { border: none; font-size: 11px; color: #5e6c84; font-style: italic; width: 100%; outline: none; margin-top: 4px; }
        .card.allergy { border-left: 4px solid var(--danger-color); background-color: #fff9f8; }

        .add-card-form { padding: 6px; border-top: 1px solid #ddd; display: flex; gap: 4px; }
        .add-card-input { flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
        .add-card-btn { background-color: #5aac44; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>🗺️ Multi-Row Travel Workspace</h1>
            <a href="https://www.google.com/maps/d/u/0/edit?mid=1HXaPjOUQA7flHmrtlh2MFEV1rOpq7wo&usp=sharing" target="_blank" class="btn-map-master">📍 Open Connected Map</a>
        </div>
        <div class="export-controls">
            <button class="btn btn-share" onclick="toggleSyncHub('export')">📤 Export Sync Code</button>
            <button class="btn btn-import" onclick="toggleSyncHub('import')">📥 Import Friend's Code</button>
            <button class="btn btn-clear" onclick="resetBoard()">Reset App</button>
            <button class="btn btn-pdf" onclick="window.print()">PDF</button>
            <button class="btn btn-excel" onclick="exportToExcel()">Spreadsheet</button>
        </div>
    </header>

    <div class="sync-hub" id="syncHub">
        <h3 id="syncHubTitle">Workspace Synchronization Data</h3>
        <textarea id="syncDataArea" placeholder="Paste data text string code package here..."></textarea>
        <div class="sync-hub-buttons">
            <button class="btn btn-share" id="syncActionBtn" onclick="executeSyncAction()">Copy Data</button>
            <button class="btn btn-clear" onclick="toggleSyncHub(false)">Close Panel</button>
        </div>
    </div>

    <div class="top-row-grid" id="topGrid"></div>

    <div class="days-grid" id="daysGrid"></div>

    <script>
        let currentMode = '';
        
        // Comprehensive baseline setup structured around your exact configuration
        const defaultLayout = [
            { id: "rules", title: "📌 Rules & Notes", subtitle: "Core Parameters", cards: [{ title: "⚠️ Dietary Safety", notes: "Trip Parameter", type: "allergy" }] },
            { id: "backlog", title: "🗂️ Backlog", subtitle: "Unassigned pool", cards: [{ title: "SF MOMA", notes: "Target Note", type: "" }] },
            { id: "done", title: "✅ Done", subtitle: "Completed Targets", cards: [] },
            { id: "day1", title: "📅 Day 1", subtitle: "Arrival & SF Art", cards: [] },
            { id: "day2", title: "📅 Day 2", subtitle: "Parks & Science", cards: [] },
            { id: "day3", title: "📅 Day 3", subtitle: "Edit focus...", cards: [] },
            { id: "day4", title: "📅 Day 4", subtitle: "Edit focus...", cards: [] },
            { id: "day5", title: "📅 Day 5", subtitle: "Edit focus...", cards: [] },
            { id: "day6", title: "📅 Day 6", subtitle: "Edit focus...", cards: [] },
            { id: "day7", title: "📅 Day 7", subtitle: "Edit focus...", cards: [] },
            { id: "day8", title: "📅 Day 8", subtitle: "Edit focus...", cards: [] },
            { id: "day9", title: "📅 Day 9", subtitle: "Edit focus...", cards: [] },
            { id: "day10", title: "📅 Day 10", subtitle: "Edit focus...", cards: [] }
        ];

        function serializeBoard() {
            const layoutStructure = [];
            // Parse top row tracks
            document.getElementById('topGrid').querySelectorAll('.list').forEach(list => {
                layoutStructure.push(serializeListElement(list));
            });
            // Parse day rows tracks
            document.getElementById('daysGrid').querySelectorAll('.list').forEach(list => {
                layoutStructure.push(serializeListElement(list));
            });
            return layoutStructure;
        }

        function serializeListElement(list) {
            const cardArray = [];
            list.querySelectorAll('.card').forEach(card => {
                cardArray.push({
                    title: card.querySelector('.card-title-input').value,
                    notes: card.querySelector('.card-notes-input').value,
                    type: card.classList.contains('allergy') ? 'allergy' : ''
                });
            });
            return {
                id: list.getAttribute('data-list-id'),
                title: list.querySelector('.list-header-input').value,
                subtitle: list.querySelector('.list-subtitle-input').value,
                cards: cardArray
            };
        }

        function saveBoardToStorage() {
            localStorage.setItem('sf_travel_board_state', JSON.stringify(serializeBoard()));
        }

        // Calculates parameters and appends next logical sequence day item safely
        function addNewDayColumn() {
            const currentData = serializeBoard();
            const onlyDays = currentData.filter(item => item.id.startsWith('day'));
            
            let maxDayNum = 0;
            onlyDays.forEach(day => {
                const num = parseInt(day.id.replace('day', ''));
                if(!isNaN(num) && num > maxDayNum) maxDayNum = num;
            });
            
            const targetNextDay = maxDayNum + 1;
            const newDayObj = {
                id: `day${targetNextDay}`,
                title: `📅 Day ${targetNextDay}`,
                subtitle: "Edit focus...",
                cards: []
            };

            currentData.push(newDayObj);
            localStorage.setItem('sf_travel_board_state', JSON.stringify(currentData));
            loadBoardFromStorage();
        }

        function loadBoardFromStorage() {
            const rawData = localStorage.getItem('sf_travel_board_state');
            const dataStructure = rawData ? JSON.parse(rawData) : defaultLayout;
            
            const topGrid = document.getElementById('topGrid');
            const daysGrid = document.getElementById('daysGrid');
            
            topGrid.innerHTML = '';
            daysGrid.innerHTML = '';

            dataStructure.forEach(item => {
                const node = buildListNode(item);
                // Dynamically route tracking cards to specific geometric tiers
                if(['rules', 'backlog', 'done'].includes(item.id)) {
                    topGrid.appendChild(node);
                } else {
                    daysGrid.appendChild(node);
                }
            });

            // Insert interactive dynamic builder slot inside row 1 space 4 position
            const plusSlot = document.createElement('div');
            plusSlot.className = 'add-day-placeholder';
            plusSlot.innerHTML = `<span>+</span>Add New Day Column`;
            plusSlot.onclick = addNewDayColumn;
            topGrid.appendChild(plusSlot);
        }

        function buildListNode(data) {
            const list = document.createElement('div');
            list.className = 'list';
            list.setAttribute('data-list-id', data.id);
            
            const hIn = document.createElement('input');
            hIn.className = 'list-header-input';
            hIn.value = data.title;
            hIn.addEventListener('input', saveBoardToStorage);

            const sIn = document.createElement('input');
            sIn.className = 'list-subtitle-input';
            sIn.value = data.subtitle;
            sIn.addEventListener('input', saveBoardToStorage);

            const container = document.createElement('div');
            container.className = 'card-container';
            data.cards.forEach(cData => container.appendChild(buildCardNode(cData, data.id)));

            const form = document.createElement('div');
            form.className = 'add-card-form';
            const formInput = document.createElement('input');
            formInput.className = 'add-card-input';
            formInput.placeholder = "Add activity...";
            
            const formBtn = document.createElement('button');
            formBtn.className = 'add-card-btn';
            formBtn.textContent = "Add";

            formBtn.onclick = () => {
                if(!formInput.value.trim()) return;
                container.appendChild(buildCardNode({ title: formInput.value.trim(), notes: '', type: '' }, data.id));
                formInput.value = '';
                saveBoardToStorage();
            };
            formInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && formInput.value.trim()) {
                    container.appendChild(buildCardNode({ title: formInput.value.trim(), notes: '', type: '' }, data.id));
                    formInput.value = '';
                    saveBoardToStorage();
                }
            });

            form.appendChild(formInput);
            form.appendChild(formBtn);
            list.appendChild(hIn);
            list.appendChild(sIn);
            list.appendChild(container);
            list.appendChild(form);
            return list;
        }

        function buildCardNode(cData, listId) {
            const card = document.createElement('div');
            card.className = 'card';
            if(cData.type) card.classList.add(cData.type);

            const row = document.createElement('div');
            row.className = 'card-header-row';

            const tIn = document.createElement('input');
            tIn.className = 'card-title-input';
            tIn.value = cData.title;
            tIn.addEventListener('input', saveBoardToStorage);

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            if(listId !== 'rules') {
                const mapLink = document.createElement('a');
                mapLink.className = 'map-link';
                mapLink.target = '_blank';
                mapLink.textContent = '📍';
                mapLink.href = `https://www.google.com/maps/d/u/0/edit?mid=1HXaPjOUQA7flHmrtlh2MFEV1rOpq7wo&usp=sharing?q=${encodeURIComponent(cData.title)}`;
                actions.appendChild(mapLink);
            }

            const del = document.createElement('button');
            del.className = 'btn-delete-card';
            del.textContent = '✕';
            del.onclick = () => { card.remove(); saveBoardToStorage(); };
            actions.appendChild(del);

            row.appendChild(tIn);
            row.appendChild(actions);

            const nIn = document.createElement('input');
            nIn.className = 'card-notes-input';
            nIn.value = cData.notes;
            nIn.addEventListener('input', saveBoardToStorage);

            card.appendChild(row);
            card.appendChild(nIn);
            return card;
        }

        function toggleSyncHub(mode) {
            const hub = document.getElementById('syncHub');
            const area = document.getElementById('syncDataArea');
            const title = document.getElementById('syncHubTitle');
            const btn = document.getElementById('syncActionBtn');
            
            if(!mode) { hub.style.display = 'none'; return; }
            hub.style.display = 'block';
            currentMode = mode;

            if(mode === 'export') {
                title.textContent = "📤 Send this sync code block package directly to your travel buddies:";
                area.value = btoa(encodeURIComponent(JSON.stringify(serializeBoard())));
                area.select();
                btn.textContent = "Copy to Clipboard";
                btn.style.backgroundColor = "#5aac44";
            } else {
                title.textContent = "📥 Paste the sync data block received from your buddy below:";
                area.value = "";
                area.placeholder = "Paste long code data sequence track string bundle here...";
                btn.textContent = "Load & Overwrite Workspace";
                btn.style.backgroundColor = "#026aa7";
            }
        }

        function executeSyncAction() {
            const area = document.getElementById('syncDataArea');
            if(currentMode === 'export') {
                navigator.clipboard.writeText(area.value);
                alert("📋 Sync code string copied safely! Send it via message app.");
                toggleSyncHub(false);
            } else {
                try {
                    const cleanInput = area.value.trim();
                    const parsedLayout = JSON.parse(decodeURIComponent(atob(cleanInput)));
                    if(Array.isArray(parsedLayout)) {
                        localStorage.setItem('sf_travel_board_state', JSON.stringify(parsedLayout));
                        loadBoardFromStorage();
                        alert("✨ Layout imported completely! Data synced.");
                        toggleSyncHub(false);
                    }
                } catch(e) {
                    alert("❌ Invalid text bundle block code. Make sure to copy the complete string group.");
                }
            }
        }

        function resetBoard() {
            if(confirm("Are you sure you want to completely restore the baseline day setup template?")) {
                localStorage.removeItem('sf_travel_board_state');
                loadBoardFromStorage();
            }
        }

        window.onload = loadBoardFromStorage;

        function exportToExcel() {
            const data = [];
            document.querySelectorAll('.list').forEach(list => {
                const title = list.querySelector('.list-header-input').value;
                list.querySelectorAll('.card').forEach(card => {
                    data.push({
                        TimelineTier: title,
                        TargetActivity: card.querySelector('.card-title-input').value,
                        InternalNotes: card.querySelector('.card-notes-input').value
                    });
                });
            });
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Itinerary");
            XLSX.writeFile(workbook, "Dynamic_Travel_Grid.xlsx");
        }
    </script>
</body>
</html>
