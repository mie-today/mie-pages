<!-- panel-logs-ams.html — MIE Health · Activity, Mood & Sleep Panel -->
<!-- Standalone panel: inject into #panel-body via loadPanelContent() -->
<!-- Handles: activity, sleep, mood views -->
<style>
.pl-wrap{display:flex;flex-direction:column;font-family:'DM Sans',sans-serif;}

/* ── Cards ── */
.pl-card{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:14px 16px;margin-bottom:10px;flex-shrink:0;}
.pl-card-title{font-size:12.5px;font-weight:700;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.pl-card-title.foldable{cursor:pointer;user-select:none;}
.pl-fold-btn{background:none;border:none;cursor:pointer;color:#9aa0a6;font-size:13px;line-height:1;padding:2px 5px;border-radius:4px;transition:all .12s;font-family:sans-serif;display:flex;align-items:center;gap:3px;}
.pl-fold-btn:hover{background:#f1f3f4;color:#5f6368;}
.pl-fold-body.collapsed{display:none;}

/* ── Edit banner ── */
.pl-edit-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:7px;padding:7px 11px;font-size:12.5px;color:#856404;font-weight:600;margin-bottom:8px;display:none;align-items:center;justify-content:space-between;}
.pl-edit-banner.show{display:flex;}
.pl-edit-banner-cancel{background:none;border:none;cursor:pointer;color:#856404;font-size:13px;font-weight:700;padding:0 2px;line-height:1;}

/* ── Summary bar ── */
.pl-sum-bar{display:grid;gap:4px;margin-bottom:10px;}
.pl-sum-item{background:#f8f9fa;border-radius:8px;padding:8px 6px;text-align:center;}
.pl-sum-val{font-size:15.5px;font-weight:700;color:#202124;}
.pl-sum-lbl{font-size:11.5px;color:#5f6368;margin-top:1px;}

/* ── Form ── */
.pl-form{background:#f8f9fa;border:1px solid #e8eaed;border-radius:8px;padding:12px 13px;overflow:hidden;}
.pl-row{display:grid;gap:8px;margin-bottom:10px;align-items:end;}
.pl-row.c2{grid-template-columns:1fr 1fr;}
.pl-row.c3{grid-template-columns:1fr 1fr 1fr;}
.pl-field{display:flex;flex-direction:column;min-width:0;}
.pl-field label{display:block;font-size:11.5px;font-weight:700;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.pl-input{width:100%;border:1px solid #dadce0;border-radius:6px;padding:7px 10px;font-size:14px;font-family:'DM Sans',sans-serif;color:#202124;background:#fff;outline:none;transition:border-color .12s;box-sizing:border-box;}
.pl-input:focus{border-color:#1a73e8;}
.pl-textarea{width:100%;border:1px solid #dadce0;border-radius:6px;padding:8px 10px;font-size:14px;font-family:'DM Sans',sans-serif;color:#202124;background:#fff;outline:none;resize:vertical;min-height:70px;line-height:1.5;box-sizing:border-box;}
.pl-textarea:focus{border-color:#1a73e8;}

/* ── Unit pills ── */
.pl-field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.pl-field-header label{font-size:11.5px;font-weight:700;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;margin:0;}
.pl-unit-pill-row{display:flex;gap:4px;}
.pl-unit-pill{border:1.5px solid #dadce0;background:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#5f6368;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;line-height:1.7;}
.pl-unit-pill.active{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe;}

/* ── Buttons ── */
.pl-btn-row{display:flex;gap:6px;margin-top:8px;}
.pl-btn-save{flex:1;background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .12s;}
.pl-btn-save:hover{background:#1765cc;}
.pl-btn-save:disabled{background:#a8c7fa;cursor:not-allowed;}
.pl-btn-cancel{background:#f1f3f4;color:#5f6368;border:1px solid #e0e0e0;border-radius:6px;padding:9px 16px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.pl-status{font-size:12.5px;text-align:center;min-height:16px;margin-top:5px;}
.pl-status.ok{color:#1e8e3e;}.pl-status.err{color:#d93025;}

/* ── Add to Calendar ── */
.pl-cal-row{display:flex;align-items:center;gap:7px;margin-top:8px;padding:7px 10px;background:#e8f0fe;border-radius:7px;border:1px solid #c5d8fb;flex-wrap:wrap;}
.pl-cal-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#1a73e8;flex-shrink:0;}
.pl-cal-row label{font-size:12.5px;color:#1a73e8;font-weight:600;cursor:pointer;margin:0;flex:1;}
.pl-cal-row .pl-cal-note{font-size:11px;color:#5f6368;}

/* ── Log list ── */
.pl-log-list{display:flex;flex-direction:column;gap:5px;}
.pl-log-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e8eaed;border-radius:8px;background:#fff;transition:background .1s;}
.pl-log-item:hover{background:#f8f9fa;}
.pl-log-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pl-log-main{flex:1;min-width:0;}
.pl-log-name{font-size:14px;font-weight:600;color:#202124;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-log-sub{font-size:12.5px;color:#5f6368;margin-top:2px;}
.pl-log-val{font-size:13.5px;font-weight:700;color:#1a73e8;white-space:nowrap;}
.pl-log-empty{font-size:14px;color:#5f6368;font-style:italic;text-align:center;padding:18px 0;}
.pl-log-actions{display:flex;gap:3px;flex-shrink:0;}
.pl-log-edit,.pl-log-del{background:none;border:1px solid #dadce0;border-radius:5px;cursor:pointer;color:#5f6368;font-size:12px;padding:3px 7px;line-height:1.4;font-family:'DM Sans',sans-serif;transition:all .12s;}
.pl-log-edit:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe;}
.pl-log-del:hover{border-color:#d93025;color:#d93025;background:#fce8e6;}

/* ── MET hint ── */
.pl-fname-msg{font-size:13px;color:#5f6368;font-style:italic;padding:11px;text-align:center;}

/* ── Sleep quality / Energy picker ── */
.pl-picker-row{display:flex;gap:5px;margin-bottom:10px;}
.pl-pick-btn{flex:1;border:1.5px solid #e0e0e0;background:#fff;border-radius:7px;padding:7px 3px;font-size:12.5px;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;color:#5f6368;}
.pl-pick-btn .pick-icon{font-size:20px;display:block;line-height:1.2;}
.pl-pick-btn .pick-lbl{font-size:10.5px;display:block;margin-top:2px;}
.pl-pick-btn.active{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8;}

/* ── Mood grid ── */
.pl-mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.pl-mood-btn{border:1.5px solid #e0e0e0;background:#fff;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .12s;}
.pl-mood-btn:hover,.pl-mood-btn.active{border-color:#1a73e8;background:#e8f0fe;}
.pl-mood-emoji{font-size:21px;display:block;}
.pl-mood-label{font-size:11px;color:#5f6368;margin-top:3px;}

/* ── Notes wide ── */
.pl-notes-wide{margin-bottom:10px;}
.pl-notes-wide label{display:block;font-size:11.5px;font-weight:700;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}

/* ── Sleep bar chart ── */
.pl-chart{padding:8px 0 4px;}
.pl-chart-bars{display:flex;gap:3px;align-items:flex-end;height:70px;}
.pl-chart-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;}
.pl-chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s;}
.pl-chart-date{font-size:10px;color:#5f6368;}
.pl-chart-val{font-size:10.5px;font-weight:600;color:#202124;}
.pl-chart-avg{font-size:12.5px;color:#5f6368;margin-top:5px;text-align:center;}

/* ══════════════════════════════
   MOBILE
══════════════════════════════ */
@media(max-width:900px){
  .pl-row.c3{grid-template-columns:1fr 1fr;}
  .pl-row.c2{grid-template-columns:1fr;}
  .pl-mood-grid{grid-template-columns:repeat(3,1fr);}
  .pl-picker-row{flex-wrap:wrap;}
  .pl-pick-btn{flex:0 0 calc(20% - 4px);min-width:0;}
  .pl-log-actions{opacity:1;}
  .pl-input,.pl-textarea{font-size:16px;}
  /* Sleep time inputs: full width stacked */
  .pl-sleep-time-row{grid-template-columns:1fr !important;}
  .pl-sleep-time-row .pl-field{width:100%;min-width:0;overflow:hidden;}
  .pl-input[type="time"]{
    width:100% !important;max-width:100% !important;min-width:0 !important;
    -webkit-appearance:none;appearance:none;
    font-size:16px;padding:10px 12px;display:block;box-sizing:border-box !important;
  }
}
@media(max-width:480px){
  .pl-card{padding:12px;}
  .pl-form{padding:10px 11px;overflow:hidden;}
  .pl-btn-save,.pl-btn-cancel{font-size:13px;padding:8px;}
  .pl-mood-grid{grid-template-columns:repeat(3,1fr);gap:4px;}
}
</style>

<div class="pl-wrap">

  <!-- ══════════════════════════════
       ACTIVITY
  ══════════════════════════════ -->
  <div id="pams-activity-section">
    <!-- Summary -->
    <div class="pl-sum-bar" style="grid-template-columns:repeat(4,1fr);">
      <div class="pl-sum-item"><div class="pl-sum-val" id="pa-cal">—</div><div class="pl-sum-lbl">Cal Burned</div></div>
      <div class="pl-sum-item"><div class="pl-sum-val" id="pa-steps">—</div><div class="pl-sum-lbl">Steps</div></div>
      <div class="pl-sum-item"><div class="pl-sum-val" id="pa-dist">—</div><div class="pl-sum-lbl">Distance</div></div>
      <div class="pl-sum-item"><div class="pl-sum-val" id="pa-dur">—</div><div class="pl-sum-lbl">Active Min</div></div>
    </div>

    <!-- Add Activity form -->
    <div class="pl-card">
      <div class="pl-card-title foldable" onclick="pamsToggleFold('pa-fold')">
        Add Activity
        <button class="pl-fold-btn" id="pa-fold-btn"
                onclick="event.stopPropagation();pamsToggleFold('pa-fold')">▸ Show</button>
      </div>
      <div class="pl-fold-body collapsed" id="pa-fold">
        <div class="pl-form">
          <div class="pl-edit-banner" id="pa-edit-banner">
            ✏️ Editing: <span id="pa-edit-label" style="font-weight:400;"></span>
            <button class="pl-edit-banner-cancel" onclick="pamsActCancelEdit()">✕ Cancel</button>
          </div>
          <div class="pl-row c2">
            <div class="pl-field"><label>Activity Type *</label>
              <input class="pl-input" id="pa-type" type="text" placeholder="e.g. Running" oninput="pamsActMETHint()"/>
            </div>
            <div class="pl-field"><label>Duration (min)</label>
              <input class="pl-input" id="pa-dur-in" type="number" placeholder="0" min="0" oninput="pamsActAutoCalc()"/>
            </div>
          </div>
          <div class="pl-row c3">
            <div class="pl-field"><label>Sets</label><input class="pl-input" id="pa-sets" type="number" placeholder="3" min="0"/></div>
            <div class="pl-field"><label>Reps</label><input class="pl-input" id="pa-reps" type="number" placeholder="15" min="0"/></div>
            <div class="pl-field">
              <div class="pl-field-header">
                <label>Weight</label>
                <div class="pl-unit-pill-row">
                  <button class="pl-unit-pill active" id="pa-wunit-kg" onclick="pamsSetWeightUnit('kg')">kg</button>
                  <button class="pl-unit-pill" id="pa-wunit-lb" onclick="pamsSetWeightUnit('lb')">lb</button>
                </div>
              </div>
              <input class="pl-input" id="pa-wkg" type="number" placeholder="30" min="0" step="0.5"/>
            </div>
          </div>
          <div class="pl-row c3">
            <div class="pl-field">
              <label>MET Value <span id="pa-met-hint" style="font-weight:400;color:#1a73e8;"></span></label>
              <input class="pl-input" id="pa-met" type="number" placeholder="e.g. 8.0" step="0.1" oninput="pamsActAutoCalc()"/>
            </div>
            <div class="pl-field"><label>Cal Burned <span style="font-weight:400;color:#1a73e8;">(auto)</span></label>
              <input class="pl-input" id="pa-cal-in" type="number" placeholder="Auto" min="0"/>
            </div>
            <div class="pl-field">
              <label>Steps <span style="font-weight:400;color:#1a73e8;font-size:9px;">→ auto dist</span></label>
              <input class="pl-input" id="pa-steps-in" type="number" placeholder="0" min="0" oninput="pamsActStepsToDistance()"/>
            </div>
          </div>
          <div class="pl-row c2">
            <div class="pl-field">
              <div class="pl-field-header">
                <label>Distance</label>
                <div class="pl-unit-pill-row">
                  <button class="pl-unit-pill active" id="pa-dunit-km" onclick="pamsSetDistUnit('km')">km</button>
                  <button class="pl-unit-pill" id="pa-dunit-mi" onclick="pamsSetDistUnit('mi')">mi</button>
                </div>
              </div>
              <input class="pl-input" id="pa-dist-in" type="number" placeholder="0" step="0.01" min="0"/>
            </div>
            <div class="pl-field"><label>Notes</label>
              <input class="pl-input" id="pa-notes" type="text" placeholder="Optional"/>
            </div>
          </div>
          <div class="pl-btn-row">
            <button class="pl-btn-cancel" onclick="pamsActClear()">Clear</button>
            <button class="pl-btn-save" id="pa-save-btn" onclick="pamsActSave()">Add Activity</button>
          </div>
          <div class="pl-cal-row">
            <input type="checkbox" id="pa-cal-chk"/>
            <label for="pa-cal-chk">Add to Calendar</label>
            <span class="pl-cal-note">Visibility: Private</span>
          </div>
          <div class="pl-status" id="pa-status"></div>
        </div>
      </div>
    </div>

    <!-- Activity log -->
    <div class="pl-card">
      <div class="pl-card-title">Today's Activity Log</div>
      <div id="pa-log"></div>
    </div>
  </div>

  <!-- ══════════════════════════════
       SLEEP
  ══════════════════════════════ -->
  <div id="pams-sleep-section">
    <div class="pl-card">
      <div class="pl-card-title foldable" onclick="pamsToggleFold('ps-fold')">
        Log Sleep
        <button class="pl-fold-btn" id="ps-fold-btn"
                onclick="event.stopPropagation();pamsToggleFold('ps-fold')">▸ Show</button>
      </div>
      <div class="pl-fold-body collapsed" id="ps-fold">
        <div class="pl-form">
          <div class="pl-edit-banner" id="ps-edit-banner">
            ✏️ Editing: <span id="ps-edit-label" style="font-weight:400;"></span>
            <button class="pl-edit-banner-cancel" onclick="pamsSleepCancelEdit()">✕ Cancel</button>
          </div>
          <!-- Bedtime + Wake: stacks on mobile via .pl-sleep-time-row -->
          <div class="pl-row c2 pl-sleep-time-row">
            <div class="pl-field"><label>Bedtime</label>
              <input class="pl-input" type="time" id="ps-bed" oninput="pamsSleepCalc()"/>
            </div>
            <div class="pl-field"><label>Wake Time</label>
              <input class="pl-input" type="time" id="ps-wake" oninput="pamsSleepCalc()"/>
            </div>
          </div>
          <div class="pl-row" style="grid-template-columns:1fr;margin-bottom:10px;">
            <div class="pl-field">
              <label>Duration <span style="color:#1a73e8;font-weight:400;">(auto)</span></label>
              <input class="pl-input" id="ps-dur" type="text" placeholder="—" readonly/>
            </div>
          </div>
          <div class="pl-field" style="margin-bottom:10px;">
            <label>Sleep Quality</label>
            <div class="pl-picker-row">
              <button class="pl-pick-btn" data-q="1" onclick="pamsSetQ(1)"><span class="pick-icon">😴</span><span class="pick-lbl">Poor</span></button>
              <button class="pl-pick-btn" data-q="2" onclick="pamsSetQ(2)"><span class="pick-icon">😐</span><span class="pick-lbl">Fair</span></button>
              <button class="pl-pick-btn" data-q="3" onclick="pamsSetQ(3)"><span class="pick-icon">🙂</span><span class="pick-lbl">Good</span></button>
              <button class="pl-pick-btn" data-q="4" onclick="pamsSetQ(4)"><span class="pick-icon">😊</span><span class="pick-lbl">Great</span></button>
              <button class="pl-pick-btn" data-q="5" onclick="pamsSetQ(5)"><span class="pick-icon">🌟</span><span class="pick-lbl">Excellent</span></button>
            </div>
          </div>
          <div class="pl-notes-wide">
            <label>Notes</label>
            <textarea class="pl-textarea" id="ps-notes" placeholder="e.g. vivid dreams, woke up at 3am…"></textarea>
          </div>
          <div class="pl-btn-row">
            <button class="pl-btn-cancel" onclick="pamsSleepClear()">Clear</button>
            <button class="pl-btn-save" id="ps-save-btn" onclick="pamsSleepSave()">Log Sleep</button>
          </div>
          <div class="pl-cal-row">
            <input type="checkbox" id="ps-cal-chk"/>
            <label for="ps-cal-chk">Add to Calendar</label>
            <span class="pl-cal-note">Visibility: Private</span>
          </div>
          <div class="pl-status" id="ps-status"></div>
        </div>
      </div>
    </div>

    <div class="pl-card">
      <div class="pl-card-title">Monthly Sleep Chart</div>
      <div class="pl-chart" id="ps-chart"><div class="pl-fname-msg">Loading chart…</div></div>
    </div>

    <div class="pl-card">
      <div class="pl-card-title">Recent Sleep Log</div>
      <div id="ps-log"></div>
    </div>
  </div>

  <!-- ══════════════════════════════
       MOOD
  ══════════════════════════════ -->
  <div id="pams-mood-section">
    <div class="pl-card">
      <div class="pl-card-title foldable" onclick="pamsToggleFold('pm-fold')">
        How are you feeling?
        <button class="pl-fold-btn" id="pm-fold-btn"
                onclick="event.stopPropagation();pamsToggleFold('pm-fold')">▸ Show</button>
      </div>
      <div class="pl-fold-body collapsed" id="pm-fold">
        <div class="pl-form">
          <div class="pl-edit-banner" id="pm-edit-banner">
            ✏️ Editing: <span id="pm-edit-label" style="font-weight:400;"></span>
            <button class="pl-edit-banner-cancel" onclick="pamsMoodCancelEdit()">✕ Cancel</button>
          </div>
          <div class="pl-mood-grid">
            <button class="pl-mood-btn" data-m="Amazing"  onclick="pamsSetMood('Amazing')"><span class="pl-mood-emoji">🤩</span><div class="pl-mood-label">Amazing</div></button>
            <button class="pl-mood-btn" data-m="Happy"    onclick="pamsSetMood('Happy')"><span class="pl-mood-emoji">😊</span><div class="pl-mood-label">Happy</div></button>
            <button class="pl-mood-btn" data-m="Calm"     onclick="pamsSetMood('Calm')"><span class="pl-mood-emoji">😌</span><div class="pl-mood-label">Calm</div></button>
            <button class="pl-mood-btn" data-m="Neutral"  onclick="pamsSetMood('Neutral')"><span class="pl-mood-emoji">😐</span><div class="pl-mood-label">Neutral</div></button>
            <button class="pl-mood-btn" data-m="Tired"    onclick="pamsSetMood('Tired')"><span class="pl-mood-emoji">😴</span><div class="pl-mood-label">Tired</div></button>
            <button class="pl-mood-btn" data-m="Anxious"  onclick="pamsSetMood('Anxious')"><span class="pl-mood-emoji">😰</span><div class="pl-mood-label">Anxious</div></button>
            <button class="pl-mood-btn" data-m="Sad"      onclick="pamsSetMood('Sad')"><span class="pl-mood-emoji">😢</span><div class="pl-mood-label">Sad</div></button>
            <button class="pl-mood-btn" data-m="Angry"    onclick="pamsSetMood('Angry')"><span class="pl-mood-emoji">😠</span><div class="pl-mood-label">Angry</div></button>
            <button class="pl-mood-btn" data-m="Stressed" onclick="pamsSetMood('Stressed')"><span class="pl-mood-emoji">😫</span><div class="pl-mood-label">Stressed</div></button>
            <button class="pl-mood-btn" data-m="Grateful" onclick="pamsSetMood('Grateful')"><span class="pl-mood-emoji">🙏</span><div class="pl-mood-label">Grateful</div></button>
          </div>
          <div class="pl-field" style="margin-bottom:10px;">
            <label>Energy Level</label>
            <div class="pl-picker-row">
              <button class="pl-pick-btn" data-e="1" onclick="pamsSetE(1)"><span class="pick-icon">⚡</span><span class="pick-lbl">Very Low</span></button>
              <button class="pl-pick-btn" data-e="2" onclick="pamsSetE(2)"><span class="pick-icon">🔋</span><span class="pick-lbl">Low</span></button>
              <button class="pl-pick-btn" data-e="3" onclick="pamsSetE(3)"><span class="pick-icon">⚡</span><span class="pick-lbl">Medium</span></button>
              <button class="pl-pick-btn" data-e="4" onclick="pamsSetE(4)"><span class="pick-icon">🔥</span><span class="pick-lbl">High</span></button>
              <button class="pl-pick-btn" data-e="5" onclick="pamsSetE(5)"><span class="pick-icon">💥</span><span class="pick-lbl">Peak</span></button>
            </div>
          </div>
          <div class="pl-notes-wide">
            <label>Notes</label>
            <textarea class="pl-textarea" id="pm-notes" placeholder="What's on your mind? How was your day?" style="min-height:100px;"></textarea>
          </div>
          <div class="pl-btn-row">
            <button class="pl-btn-cancel" onclick="pamsMoodClear()">Clear</button>
            <button class="pl-btn-save" id="pm-save-btn" onclick="pamsMoodSave()">Log Mood</button>
          </div>
          <div class="pl-cal-row">
            <input type="checkbox" id="pm-cal-chk"/>
            <label for="pm-cal-chk">Add to Calendar</label>
            <span class="pl-cal-note">Visibility: Private</span>

<script>
(function(){
'use strict';

var BACKEND   = 'https://api.mie.today';
var _unitPref = localStorage.getItem('mie_unit') || 'metric';
var _profile  = null;

// ── Per-view state ────────────────────────────────────────────────
var _sleepQ  = 0;
var _mood    = '';
var _energy  = 0;

// ── Edit indices (separate per tab) ──────────────────────────────
var _editIdx = { activity:-1, sleep:-1, mood:-1 };

// ── Cached items for edit ────────────────────────────────────────
var _actItems   = [];
var _sleepItems = [];
var _moodItems  = [];

// ── MET reference ────────────────────────────────────────────────
var MET = {
  running:8.0, run:8.0, jogging:7.0, walking:3.5, walk:3.5,
  cycling:6.0, biking:6.0, swimming:6.0, yoga:3.0, pilates:3.0,
  hiit:8.0, 'jump rope':10.0, deadlift:6.0, squat:5.0,
  'bench press':5.0, 'strength training':5.0, weights:5.0, lifting:5.0,
  hiking:5.5, boxing:7.8, tennis:7.0, basketball:6.5, soccer:7.0,
  rowing:7.0, stretching:2.5, 'spin class':6.8, crossfit:8.0, other:4.0,
};

// ── Unit state ───────────────────────────────────────────────────
var _distUnit   = 'km';
var _weightUnit = 'kg';

// ── Helpers ──────────────────────────────────────────────────────
function setStatus(id, msg, type){
  var el = document.getElementById(id);
  if(!el) return;
  el.textContent = msg;
  el.className = 'pl-status' + (type ? ' '+type : '');
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function val(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
function setVal(id, v){ var el=document.getElementById(id); if(el) el.value=(v||''); }

// ── Section show/hide ────────────────────────────────────────────
var SECTIONS = ['activity','sleep','mood'];

function showSection(view){
  SECTIONS.forEach(function(s){
    var el = document.getElementById('pams-'+s+'-section');
    if(el) el.style.display = (s === view) ? '' : 'none';
  });
}

// ── Fold/unfold ──────────────────────────────────────────────────
window.pamsToggleFold = function(bodyId){
  var body = document.getElementById(bodyId);
  var btn  = document.getElementById(bodyId + '-btn');
  if(!body) return;
  var collapsed = body.classList.contains('collapsed');
  body.classList.toggle('collapsed', !collapsed);
  if(btn) btn.textContent = collapsed ? '▾ Hide' : '▸ Show';
};

// ── Save helper ──────────────────────────────────────────────────
function saveLog(tab, data, btnId, statusId, onSuccess, calChkId){
  var btn = document.getElementById(btnId);
  if(btn) btn.disabled = true;
  setStatus(statusId, 'Saving…', '');

  var calChk = calChkId ? document.getElementById(calChkId) : null;
  data.add_to_calendar = calChk ? calChk.checked : false;
  data.calendar_visibility = 'private';

  var editIdx = _editIdx[tab] !== undefined ? _editIdx[tab] : -1;
  var endpoint = editIdx >= 0
    ? BACKEND + '/api/me/health/log/edit'
    : BACKEND + '/api/me/health/log';
  var body = editIdx >= 0
    ? { tab:tab, row_idx:editIdx, data:data, unit_pref:_unitPref }
    : { tab:tab, data:data, unit_pref:_unitPref };

  fetch(endpoint,{
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.ok){
        setStatus(statusId, editIdx >= 0 ? '✅ Updated!' : '✅ Saved!', 'ok');
        _editIdx[tab] = -1;
        if(onSuccess) onSuccess();
        if(typeof window.refreshOverviewData==='function') window.refreshOverviewData();
      } else {
        setStatus(statusId, '❌ '+(d.message||'Error'), 'err');
      }
    })
    .catch(function(){ setStatus(statusId, '❌ Network error', 'err'); })
    .finally(function(){ if(btn) btn.disabled = false; });
}

function deleteLog(tab, idx, onSuccess){
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  fetch(BACKEND+'/api/me/health/log/delete',{
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ tab:tab, row_idx:idx })
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.ok){
        if(onSuccess) onSuccess();
        if(typeof window.refreshOverviewData==='function') window.refreshOverviewData();
      }
    })
    .catch(function(){});
}

// ════════════════════════════════════
// ACTIVITY
// ════════════════════════════════════
window.pamsSetDistUnit = function(unit){
  _distUnit = unit;
  document.getElementById('pa-dunit-km').classList.toggle('active', unit==='km');
  document.getElementById('pa-dunit-mi').classList.toggle('active', unit==='mi');
  pamsActStepsToDistance();
};

window.pamsSetWeightUnit = function(unit){
  _weightUnit = unit;
  document.getElementById('pa-wunit-kg').classList.toggle('active', unit==='kg');
  document.getElementById('pa-wunit-lb').classList.toggle('active', unit==='lb');
};

window.pamsActMETHint = function(){
  var type = val('pa-type').toLowerCase();
  var hint = document.getElementById('pa-met-hint');
  if(!hint) return;
  var met = null;
  Object.keys(MET).forEach(function(k){ if(type.indexOf(k)>=0 && !met) met=MET[k]; });
  if(met){
    hint.textContent = '(suggest: '+met+')';
    var metEl = document.getElementById('pa-met');
    if(metEl && !metEl.value) metEl.placeholder = met;
  } else {
    hint.textContent = '';
  }
};

window.pamsActStepsToDistance = function(){
  var steps = parseInt(val('pa-steps-in')) || 0;
  var distEl = document.getElementById('pa-dist-in');
  if(!distEl) return;
  if(steps > 0 && !distEl.value){
    var km = Math.round(steps * 0.000762 * 100) / 100;
    distEl.placeholder = (_distUnit==='mi'
      ? Math.round(km/1.60934*100)/100 : km) + ' (auto)';
  } else if(!steps){
    distEl.placeholder = '0';
  }
  pamsActAutoCalc();
};

window.pamsActAutoCalc = function(){
  var met = parseFloat(val('pa-met'));
  var dur = parseFloat(val('pa-dur-in'));
  if(!met){
    var type = val('pa-type').toLowerCase();
    Object.keys(MET).forEach(function(k){ if(type.indexOf(k)>=0 && !met) met=MET[k]; });
  }
  var calEl = document.getElementById('pa-cal-in');
  if(!calEl || calEl.value) return;
  var wkg = (_profile&&_profile.baseline) ? (_profile.baseline.weight_kg||70) : 70;
  if(met && dur) calEl.placeholder = Math.round(met*wkg*dur/60)+' (auto)';
};

window.pamsActClear = function(){
  ['pa-type','pa-dur-in','pa-sets','pa-reps','pa-wkg','pa-met',
   'pa-cal-in','pa-steps-in','pa-dist-in','pa-notes'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){ el.value=''; el.placeholder=el.defaultValue||''; }
  });
  setStatus('pa-status','','');
};

window.pamsActCancelEdit = function(){
  _editIdx.activity = -1;
  pamsActClear();
  var btn = document.getElementById('pa-save-btn');
  if(btn) btn.textContent = 'Add Activity';
  document.getElementById('pa-edit-banner').classList.remove('show');
};

window.pamsActSave = function(){
  var type = val('pa-type');
  if(!type){ setStatus('pa-status','Activity type is required.','err'); return; }

  var met = parseFloat(val('pa-met'))||null;
  var dur = parseFloat(val('pa-dur-in'))||null;
  var wkg = (_profile&&_profile.baseline) ? (_profile.baseline.weight_kg||null) : null;
  var calEl = document.getElementById('pa-cal-in');
  var cal = parseFloat(calEl.value)||null;
  if(!cal && met && dur && wkg) cal = Math.round(met*wkg*dur/60);

  var wRaw = parseFloat(val('pa-wkg'))||null;
  var wSave = wRaw ? (_weightUnit==='lb' ? Math.round(wRaw/2.20462*10)/10 : wRaw) : null;

  var distEl = document.getElementById('pa-dist-in');
  var distRaw = parseFloat(distEl.value)||null;
  if(!distRaw){
    var steps = parseInt(val('pa-steps-in'))||0;
    if(steps) distRaw = Math.round(steps*0.000762*100)/100;
  }
  var distKm = distRaw
    ? (_distUnit==='mi' ? Math.round(distRaw*1.60934*100)/100 : distRaw)
    : null;

  var data = {
    category:'General', type:type,
    sets:parseInt(val('pa-sets'))||null,
    reps:parseInt(val('pa-reps'))||null,
    weight_kg:wSave, duration_min:dur, distance_km:distKm,
    met_value:met, calories_burned_kcal:cal,
    steps:parseInt(val('pa-steps-in'))||null,
    notes:val('pa-notes'),
  };
  saveLog('activity', data, 'pa-save-btn', 'pa-status', function(){
    pamsActClear();
    var btn=document.getElementById('pa-save-btn'); if(btn) btn.textContent='Add Activity';
    loadActivity();
  }, 'pa-cal-chk');
};

window.pamsEditActivity = function(idx){
  var a = _actItems[idx]; if(!a) return;
  _editIdx.activity = idx;
  setVal('pa-type',     a.type||'');
  setVal('pa-dur-in',   a.duration_min||'');
  setVal('pa-sets',     a.sets||'');
  setVal('pa-reps',     a.reps||'');
  setVal('pa-wkg',      a.weight_kg||'');
  setVal('pa-met',      a.met_value||'');
  setVal('pa-cal-in',   a.calories_burned_kcal||'');
  setVal('pa-steps-in', a.steps||'');
  setVal('pa-dist-in',  a.distance_km||'');
  setVal('pa-notes',    a.notes||'');
  var banner=document.getElementById('pa-edit-banner');
  var label =document.getElementById('pa-edit-label');
  if(banner) banner.classList.add('show');
  if(label)  label.textContent = a.type||'';
  var btn=document.getElementById('pa-save-btn'); if(btn) btn.textContent='Update Activity';
  pamsActMETHint();
  // open fold
  var fold=document.getElementById('pa-fold');
  var fb=document.getElementById('pa-fold-btn');
  if(fold && fold.classList.contains('collapsed')){ fold.classList.remove('collapsed'); if(fb) fb.textContent='▾ Hide'; }
  btn.scrollIntoView({behavior:'smooth',block:'center'});
};

window.pamsDelActivity = function(idx){
  deleteLog('activity', idx, loadActivity);
};

function renderActLog(items, summary){
  _actItems = items;
  if(summary){
    document.getElementById('pa-cal').textContent   = Math.round(summary.total_calories_burned_kcal||0);
    document.getElementById('pa-steps').textContent = (summary.total_steps||0).toLocaleString();
    var distVal = summary.total_distance_km||0;
    document.getElementById('pa-dist').textContent  =
      (_distUnit==='mi' ? Math.round(distVal/1.60934*100)/100+'mi' : distVal+'km');
    var dur = items.reduce(function(s,i){ return s+(i.duration_min||0); },0);
    document.getElementById('pa-dur').textContent = Math.round(dur)+'m';
  }
  var el = document.getElementById('pa-log');
  if(!el) return;
  if(!items.length){ el.innerHTML='<div class="pl-log-empty">No activity logged today.</div>'; return; }
  var html='<div class="pl-log-list">';
  items.forEach(function(a,idx){
    var sub=[];
    if(a.duration_min) sub.push(a.duration_min+' min');
    if(a.sets&&a.reps) sub.push(a.sets+'×'+a.reps+(a.weight_kg?' @'+a.weight_kg+'kg':''));
    if(a.steps) sub.push(a.steps.toLocaleString()+' steps');
    if(a.distance_km) sub.push(a.distance_km+'km');
    html+='<div class="pl-log-item">'
      +'<div class="pl-log-dot" style="background:#1a73e8;"></div>'
      +'<div class="pl-log-main">'
        +'<div class="pl-log-name">'+(a.type||'')+'</div>'
        +'<div class="pl-log-sub">'+sub.join(' · ')+'</div>'
      +'</div>'
      +'<span class="pl-log-val">'+Math.round(a.calories_burned_kcal||0)+' kcal</span>'
      +'<div class="pl-log-actions">'
        +'<button class="pl-log-edit" onclick="pamsEditActivity('+idx+')">Edit</button>'
        +'<button class="pl-log-del"  onclick="pamsDelActivity('+idx+')">Del</button>'
      +'</div>'
    +'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function loadActivity(){
  fetch(BACKEND+'/api/me/health?date='+todayStr()+'&period=daily&tab=activity',{credentials:'include'})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){ if(d) renderActLog(d.activity||[], d.summary||{}); })
    .catch(function(){});
}

// SLEEP
// ════════════════════════════════════
window.pamsSetQ = function(q){
  _sleepQ = q;
  document.querySelectorAll('.pl-pick-btn[data-q]').forEach(function(b){
    b.classList.toggle('active', parseInt(b.dataset.q)===q);
  });
};

window.pamsSleepCalc = function(){
  var bed  = document.getElementById('ps-bed').value;
  var wake = document.getElementById('ps-wake').value;
  if(!bed||!wake) return;
  var bp=bed.split(':').map(Number), wp=wake.split(':').map(Number);
  var mins=(wp[0]*60+wp[1])-(bp[0]*60+bp[1]);
  if(mins<0) mins+=1440;
  var h=Math.floor(mins/60), m=mins%60;
  document.getElementById('ps-dur').value=h+'h '+m+'m ('+mins+' min)';
};

window.pamsSleepClear = function(){
  setVal('ps-bed',''); setVal('ps-wake',''); setVal('ps-dur',''); setVal('ps-notes','');
  _sleepQ=0;
  document.querySelectorAll('.pl-pick-btn[data-q]').forEach(function(b){ b.classList.remove('active'); });
  setStatus('ps-status','','');
};

window.pamsSleepCancelEdit = function(){
  _editIdx.sleep=-1;
  pamsSleepClear();
  var btn=document.getElementById('ps-save-btn'); if(btn) btn.textContent='Log Sleep';
  document.getElementById('ps-edit-banner').classList.remove('show');
};

window.pamsSleepSave = function(){
  var bed=val('ps-bed'), wake=val('ps-wake');
  if(!bed||!wake){ setStatus('ps-status','Bedtime and wake time required.','err'); return; }
  var data={bedtime:bed, wake_time:wake, quality_1to5:_sleepQ||null, notes:val('ps-notes')};
  saveLog('sleep', data, 'ps-save-btn', 'ps-status', function(){
    pamsSleepClear();
    var btn=document.getElementById('ps-save-btn'); if(btn) btn.textContent='Log Sleep';
    loadSleep();
  }, 'ps-cal-chk');
};

window.pamsEditSleep = function(idx){
  var s=_sleepItems[idx]; if(!s) return;
  _editIdx.sleep=idx;
  setVal('ps-bed',   s.bedtime||'');
  setVal('ps-wake',  s.wake_time||'');
  setVal('ps-notes', s.notes||'');
  pamsSleepCalc();
  if(s.quality_1to5) pamsSetQ(s.quality_1to5);
  var banner=document.getElementById('ps-edit-banner');
  var label =document.getElementById('ps-edit-label');
  if(banner) banner.classList.add('show');
  if(label)  label.textContent=(s.bedtime||'?')+' → '+(s.wake_time||'?');
  var btn=document.getElementById('ps-save-btn'); if(btn) btn.textContent='Update Sleep';
  var fold=document.getElementById('ps-fold');
  var fb=document.getElementById('ps-fold-btn');
  if(fold&&fold.classList.contains('collapsed')){ fold.classList.remove('collapsed'); if(fb) fb.textContent='▾ Hide'; }
  btn.scrollIntoView({behavior:'smooth',block:'center'});
};

window.pamsDelSleep = function(idx){
  deleteLog('sleep', idx, loadSleep);
};

function renderSleepLog(items){
  _sleepItems=items;
  var el=document.getElementById('ps-log'); if(!el) return;
  if(!items.length){ el.innerHTML='<div class="pl-log-empty">No sleep logged today.</div>'; return; }
  var ql=['','😴 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent'];
  var html='<div class="pl-log-list">';
  items.slice(-5).reverse().forEach(function(s,idx){
    html+='<div class="pl-log-item">'
      +'<div class="pl-log-dot" style="background:#7c4dff;"></div>'
      +'<div class="pl-log-main">'
        +'<div class="pl-log-name">'+(s.bedtime||'?')+' → '+(s.wake_time||'?')+'</div>'
        +'<div class="pl-log-sub">'+(s.duration_hr?s.duration_hr+'h':'')+(s.quality_1to5?' · '+ql[s.quality_1to5]:'')+(s.notes?' · '+s.notes:'')+'</div>'
      +'</div>'
      +'<div class="pl-log-actions">'
        +'<button class="pl-log-edit" onclick="pamsEditSleep('+idx+')">Edit</button>'
        +'<button class="pl-log-del"  onclick="pamsDelSleep('+idx+')">Del</button>'
      +'</div>'
    +'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function loadSleepChart(){
  var chartEl=document.getElementById('ps-chart'); if(!chartEl) return;
  var now=new Date();
  fetch(BACKEND+'/api/me/health?date='+now.toISOString().slice(0,10)+'&period=monthly&tab=sleep',{credentials:'include'})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){
      var items=d?(d.sleep||[]):[];
      if(!items.length){ chartEl.innerHTML='<div class="pl-fname-msg">No sleep data this month.</div>'; return; }
      var byDate={};
      items.forEach(function(s){ byDate[s.stamp_date]=s; });
      var days=Object.keys(byDate).sort();
      var goalHr=_profile&&_profile.goal?(_profile.goal.sleep_goal_hr||8):8;
      var avg=days.reduce(function(s,d){ return s+(byDate[d].duration_hr||0); },0)/days.length;
      var bars=days.map(function(d){
        var hr=byDate[d].duration_hr||0;
        var pct=Math.min(100,(hr/10)*100);
        var col=hr>=7?'#34a853':hr>=6?'#fbbc04':'#ea4335';
        return '<div class="pl-chart-bar-wrap">'
          +'<div style="height:60px;width:100%;display:flex;align-items:flex-end;">'
            +'<div class="pl-chart-bar" style="background:'+col+';height:'+pct+'%;width:100%;"></div>'
          +'</div>'
          +'<div class="pl-chart-date">'+d.slice(8)+'</div>'
          +'<div class="pl-chart-val">'+(hr?hr.toFixed(1):'—')+'</div>'
        +'</div>';
      });
      var goalPct=Math.min(100,(goalHr/10)*100);
      chartEl.innerHTML=
        '<div style="position:relative;">'
          +'<div style="position:absolute;top:'+(100-goalPct)+'%;width:100%;border-top:1.5px dashed #1a73e8;opacity:.5;pointer-events:none;"></div>'
          +'<div class="pl-chart-bars">'+bars.join('')+'</div>'
        +'</div>'
        +'<div class="pl-chart-avg">Monthly avg: '+avg.toFixed(1)+'h · Goal: '+goalHr+'h</div>';
    })
    .catch(function(){ chartEl.innerHTML='<div class="pl-fname-msg">Could not load chart.</div>'; });
}

function loadSleep(){
  fetch(BACKEND+'/api/me/health?date='+todayStr()+'&period=daily&tab=sleep',{credentials:'include'})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){ if(d){ renderSleepLog(d.sleep||[]); loadSleepChart(); }})
    .catch(function(){});
}

function renderMoodLog(items){
  _moodItems=items;

  var emoji={Amazing:'🤩',Happy:'😊',Calm:'😌',Neutral:'😐',Tired:'😴',Anxious:'😰',Sad:'😢',Angry:'😠',Stressed:'😫',Grateful:'🙏'};
  var html='<div class="pl-log-list">';
  items.slice(-5).reverse().forEach(function(m,idx){
    html+='<div class="pl-log-item">'
      +'<span style="font-size:22px;flex-shrink:0;">'+(emoji[m.mood]||'😐')+'</span>'
      +'<div class="pl-log-main">'
        +'<div class="pl-log-name">'+(m.mood||'')+'</div>'
        +'<div class="pl-log-sub">'+(m.energy_level?'⚡ Energy:'+m.energy_level+'/5':'')+(m.notes?' · '+m.notes:'')+'</div>'
      +'</div>'
      +'<div class="pl-log-actions">'
        +'<button class="pl-log-edit" onclick="pamsEditMood('+idx+')">Edit</button>'
        +'<button class="pl-log-del"  onclick="pamsDelMood('+idx+')">Del</button>'
      +'</div>'
    +'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function loadMood(){
  fetch(BACKEND+'/api/me/health?date='+todayStr()+'&period=daily&tab=mood',{credentials:'include'})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){ if(d) renderMoodLog(d.mood||[]); })
    .catch(function(){});
}

// ── Unit pref sync from index.html ────────────────────────────────
window.plSetUnitPref = function(pref){
  _unitPref = pref;
  localStorage.setItem('mie_unit', pref);
  var isUS = pref==='us';
  pamsSetDistUnit(isUS?'mi':'km');
  pamsSetWeightUnit(isUS?'lb':'kg');
};

function initUnitPills(){
  var isUS = _unitPref==='us';
  pamsSetDistUnit(isUS?'mi':'km');
  pamsSetWeightUnit(isUS?'lb':'kg');
}

// ── Load profile ──────────────────────────────────────────────────
function loadProfile(){
  fetch(BACKEND+'/api/me/health/profile',{credentials:'include'})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){ if(d) _profile=d; })
    .catch(function(){});
}

// ── onPanelLoad: called by index.html after injection ─────────────
window.onPanelLoad = function(v){
  if(v!=='activity' && v!=='sleep' && v!=='mood') return;
  initUnitPills();
  loadProfile();
  showSection(v);
  if(v==='activity') loadActivity();
  if(v==='sleep')    loadSleep();
  if(v==='mood')     loadMood();
};

// ── Auto-init when standalone ─────────────────────────────────────
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', function(){
    initUnitPills();
    loadProfile();
    showSection('activity');
    loadActivity();
  });
} else {
  initUnitPills();
  loadProfile();
  showSection('activity');
  loadActivity();
}

})();
</script>
